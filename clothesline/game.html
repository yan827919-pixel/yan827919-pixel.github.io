<!DOCTYPE html>
<html lang="zh-CN">
<head>
<script>(function(){if(typeof tt==='undefined')return;const _g=localStorage.getItem,_s=localStorage.setItem,_r=localStorage.removeItem;localStorage.getItem=function(k){try{return tt.getStorageSync(k)}catch(e){return _g.call(localStorage,k)}};localStorage.setItem=function(k,v){try{tt.setStorageSync(k,v)}catch(e){_s.call(localStorage,k,v)}};localStorage.removeItem=function(k){try{tt.removeStorageSync(k)}catch(e){_r.call(localStorage,k)}};if(tt.postMessage)tt.postMessage({type:'ready'});})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>晾衣绳配对</title>
<style>
:root{--sky-top:#bfe0f2;--sky-bottom:#eaf3e2;--ground:#c9dba0;--card:#fffdf8;--border:#ddd9cd;--border-strong:#a89f8c;--text:#2c2c2a;--text-secondary:#5f5e5a;--text-muted:#948d7c;--danger:#c23b3b;--wood:#a9764f;--wood-dark:#8a5d3b;--star:#e6b800;--bomb:#e04040;--gold:#d4a017;--achieve-got:#1D9E75;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
body{margin:0;padding:0;overflow:hidden;height:100dvh;width:100vw;background:linear-gradient(180deg,var(--sky-top)0%,var(--sky-bottom)55%,var(--ground)100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;display:flex;justify-content:center;align-items:center;}
#game{width:100%;max-width:480px;height:100dvh;height:100vh;background:var(--card);padding:calc(6px+var(--safe-top))8px calc(4px+var(--safe-bottom));position:relative;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;}
#game::-webkit-scrollbar{display:none;}.gameFill{flex:1;display:flex;flex-direction:column;min-height:0;}
h1{font-size:16px;font-weight:700;margin:0 0 1px;text-align:center;letter-spacing:0.5px;}
.subtitle{text-align:center;font-size:9px;color:var(--text-muted);margin:0 0 5px;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;font-size:10px;flex-wrap:wrap;gap:2px;}
.topbar .stats{display:flex;gap:8px;align-items:center;}
.label{color:var(--text-secondary);}
.val{font-size:14px;font-weight:700;margin-left:2px;font-variant-numeric:tabular-nums;}
#hearts{display:flex;gap:2px;font-size:14px;}
.heart{color:var(--border-strong);transition:transform .2s;}.heart.on{color:var(--danger);}.heart.lost{animation:heartLost .4s ease;}
@keyframes heartLost{0%{transform:scale(1.4)}100%{transform:scale(1)}}
.windrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:1px;}
.windrow .left{display:flex;align-items:center;gap:3px;color:var(--text-muted);font-size:9px;}
.combo{font-size:9px;font-weight:700;color:#c17a1f;opacity:0;transition:opacity .2s;}.combo.show{opacity:1;}
.windIcon{display:inline-block;animation:blow 1.6s ease-in-out infinite;}
@keyframes blow{0%,100%{transform:translateX(0)}50%{transform:translateX(3px)}}
.xpRow{display:flex;align-items:center;gap:4px;margin:1px 0 2px;}
.xpRow .xpLabel{font-size:8px;color:var(--text-muted);white-space:nowrap;}
.xpBarOuter{flex:1;height:4px;background:#e8e4da;border-radius:3px;overflow:hidden;}
.xpBarInner{height:100%;width:0%;background:linear-gradient(90deg,#1D9E75,#378ADD);border-radius:3px;transition:width .3s ease;}
.poleRow{display:flex;align-items:flex-start;justify-content:space-between;margin-top:2px;}
.pole{width:4px;height:9px;background:var(--wood);border-radius:2px 2px 0 0;flex-shrink:0;margin-top:-1px;}
.lineBox{flex:1;border-top:2px solid var(--wood-dark);padding-top:14px;padding-bottom:2px;margin:0 2px;position:relative;}
.slot{width:12.5%;height:44px;position:relative;flex-shrink:0;border-radius:4px;transition:background .1s,box-shadow .1s;}
.slot.hoverValid{background:rgba(29,158,117,0.14);box-shadow:inset 0 0 0 2px rgba(29,158,117,0.55);}
.slot.hoverInvalid{background:rgba(194,59,59,0.12);box-shadow:inset 0 0 0 2px rgba(194,59,59,0.5);}
.sep{border-top:1px dashed var(--border);margin:1px 0;}
.sepStrong{height:1px;background:var(--border);margin:4px 0 6px;}
.line1wrap{position:relative;}
#line1Lock{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;background:rgba(255,253,248,0.92);border-radius:5px;backdrop-filter:blur(1px);}
#line1Lock .lockIcon{width:14px;height:14px;border:2px solid var(--text-muted);border-radius:3px;position:relative;}
#line1Lock .lockIcon::before{content:"";position:absolute;top:-7px;left:2px;width:7px;height:7px;border:2px solid var(--text-muted);border-bottom:none;border-radius:4px 4px 0 0;}
#line1Lock span{font-size:9px;color:var(--text-muted);}
.trayLabel{font-size:9px;color:var(--text-secondary);margin-bottom:2px;}
#tray{display:flex;gap:5px;min-height:28px;flex-wrap:wrap;}
.sock{width:18px;height:24px;clip-path:polygon(22% 0%,78% 0%,78% 55%,100% 55%,100% 82%,55% 100%,0% 82%,0% 55%,22% 55%);position:relative;pointer-events:none;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.15));}
.sock::after{content:"";position:absolute;top:3px;left:0;right:0;height:2px;background:rgba(255,255,255,0.35);}
.sockWrap{width:34px;height:36px;display:flex;align-items:center;justify-content:center;cursor:grab;touch-action:none;transition:transform .12s;border-radius:5px;position:relative;}
.sockWrap:active{cursor:grabbing;transform:scale(1.1);}
.clip{position:absolute;top:0;left:50%;transform:translateX(-50%);width:6px;height:4px;background:var(--wood-dark);border-radius:2px;z-index:2;}
.badgeStar{position:absolute;top:-5px;right:-5px;font-size:9px;z-index:3;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.3));animation:badgePop .4s ease;}
.badgeBomb{position:absolute;top:-5px;right:-5px;font-size:9px;z-index:3;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.3));animation:badgePop .4s ease;}
.badgeGold{position:absolute;top:-6px;right:-6px;font-size:11px;z-index:3;filter:drop-shadow(0 1px 3px rgba(212,160,23,0.5));animation:badgePop .4s ease;}
@keyframes badgePop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
.scorePop{position:absolute;left:50%;top:-4px;transform:translateX(-50%);font-size:10px;font-weight:700;color:#c17a1f;pointer-events:none;animation:scoreFloat .7s ease forwards;}
@keyframes scoreFloat{0%{opacity:0;transform:translate(-50%,4px)}20%{opacity:1}100%{opacity:0;transform:translate(-50%,-16px)}}
.starPop{color:var(--star)!important;font-size:12px!important;}.bombPop{color:var(--bomb)!important;font-size:12px!important;}.goldPop{color:var(--gold)!important;font-size:14px!important;}
@keyframes pop{0%{transform:scale(1)translateX(-50%);opacity:1}60%{transform:scale(1.3)translateX(-50%);opacity:1}100%{transform:scale(0.15)translateX(-50%);opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
@keyframes achievePop{0%{transform:scale(0.5)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.pop{animation:pop .35s ease forwards;}.miss{animation:shake .3s ease;}.unlocked{animation:fadeIn .5s ease;}
#banner{position:absolute;top:5px;left:50%;transform:translateX(-50%)translateY(-140%);background:#2c2c2a;color:#fffdf8;font-size:10px;font-weight:600;padding:4px 12px;border-radius:20px;white-space:nowrap;transition:transform .35s ease;z-index:10;}
#banner.show{transform:translateX(-50%)translateY(0);}
#over{display:none;text-align:center;padding:10px 0 2px;}
#over p.title{font-size:14px;font-weight:700;margin:0 0 2px;}
#over p.sub{font-size:10px;color:var(--text-secondary);margin:0 0 6px;}
button{font-family:inherit;font-size:11px;font-weight:600;padding:5px 12px;border-radius:7px;border:1px solid var(--border-strong);background:var(--card);color:var(--text);cursor:pointer;transition:background .15s,transform .1s;}
button:hover{background:#f2eee2;}button:active{transform:scale(0.97);}
#restartBtn{display:block;margin:0 auto 4px;}#soundBtn{font-size:12px;padding:2px 6px;border-radius:4px;}
#calmBtn{font-size:9px;padding:2px 6px;display:flex;align-items:center;gap:2px;}
#calmBtn:disabled{opacity:0.4;cursor:not-allowed;}#calmBtn.ready{box-shadow:0 0 0 2px rgba(55,138,221,0.4);}

/* 弹窗 */
.modal{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.45);backdrop-filter:blur(3px);justify-content:center;align-items:center;padding:20px;}
.modal.show{display:flex;}
.modalBox{background:var(--card);border-radius:16px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto;padding:16px 14px 12px;box-shadow:0 12px 40px rgba(0,0,0,0.2);}
.modalBox h2{font-size:14px;text-align:center;margin:0 0 10px;}
.modalClose{display:block;margin:10px auto 0;font-size:11px;padding:4px 20px;}
.achieveGrid{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}
.achieveBadge{width:52px;height:46px;border-radius:7px;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:8px;color:var(--text-muted);gap:1px;background:#fcfaf6;}
.achieveBadge .icon{font-size:14px;line-height:1;}.achieveBadge .aname{font-size:7px;line-height:1.1;text-align:center;max-width:46px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.achieveBadge.got{border-color:var(--achieve-got);background:#e8f5ee;animation:achievePop .4s ease;}
.achieveBadge.got .aname{color:var(--achieve-got);font-weight:600;}
.achieveBadge.locked{opacity:0.5;filter:grayscale(0.7);}.achieveBadge.newlyGot{box-shadow:0 0 0 2px var(--star);}
.guideItem{display:flex;align-items:center;gap:8px;padding:5px 8px;background:#faf8f3;border-radius:6px;margin-bottom:5px;font-size:10px;}
.guideItem .gi{font-size:14px;width:22px;text-align:center;}.guideItem b{display:block;}.guideItem .gd{color:var(--text-muted);font-size:9px;}
.guideItem.gold{border:1px solid var(--gold);background:#fff8e6;}
#lbPanel{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.45);backdrop-filter:blur(3px);justify-content:center;align-items:center;padding:20px;}
#lbPanel.show{display:flex;}
#lbBox{background:var(--card);border-radius:16px;width:100%;max-width:380px;max-height:80vh;overflow-y:auto;padding:16px 16px 12px;box-shadow:0 12px 40px rgba(0,0,0,0.2);}
#lbBox h2{font-size:14px;text-align:center;margin:0 0 10px;}
.lbEntry{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;margin-bottom:3px;font-size:11px;}
.lbEntry:nth-child(1){background:#fff3cd;}.lbEntry:nth-child(2){background:#f0f0f0;}.lbEntry:nth-child(3){background:#fce4d6;}
.lbEntry .rank{font-weight:700;width:22px;text-align:center;color:var(--text-muted);}.lbEntry .rank.top{font-size:13px;}
.lbEntry .lbScore{font-weight:700;flex:1;text-align:right;}.lbEntry .lbLevel{color:var(--text-muted);font-size:9px;}
.lbEntry .lbDate{color:var(--text-muted);font-size:8px;min-width:55px;text-align:right;}.lbEntry.me{border:1.5px solid #378ADD;}
#lbClose{display:block;margin:8px auto 0;font-size:11px;padding:4px 20px;}

/* ===== 像素风洗衣场景 ===== */
.washSection{border-top:1px dashed var(--border);padding-top:5px;flex:1;display:flex;flex-direction:column;min-height:80px;}
.washScene{position:relative;width:100%;flex:1;border-radius:10px;overflow:hidden;cursor:pointer;background:url('images/wash_bg.png') center/cover no-repeat;min-height:60px;}
.washScene.dark{filter:brightness(0.3)contrast(0.7);}
.kidPixel{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);height:72%;max-height:82%;width:auto;cursor:pointer;transition:transform .15s;image-rendering:pixelated;z-index:2;}
.kidPixel:active{transform:translateX(-50%)scale(0.95);}
.kidPixel.waiting{animation:kidBounce 1.2s ease-in-out infinite;}
@keyframes kidBounce{0%,100%{transform:translateX(-50%)translateY(0)}50%{transform:translateX(-50%)translateY(-4px)}}
.washHint{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-size:8px;color:rgba(44,44,42,0.6);white-space:nowrap;background:rgba(255,255,255,0.7);padding:1px 8px;border-radius:6px;z-index:5;}

/* 脏袜子堆（叠在场景上） */
.dirtyOverlay{position:absolute;bottom:20%;right:8%;display:flex;gap:3px;z-index:3;align-items:flex-end;}
.dirtySock{width:14px;height:20px;background:#9c9686;clip-path:polygon(22% 0%,78% 0%,78% 55%,100% 55%,100% 82%,55% 100%,0% 82%,0% 55%,22% 55%);opacity:0.85;border-radius:2px;}
.dirtySock.target{outline:2px solid #378ADD;outline-offset:1px;border-radius:3px;animation:targetPulse 1.1s ease-in-out infinite;}
@keyframes targetPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}

.washProgRow{display:flex;align-items:center;gap:4px;margin-top:3px;}
.washProgOuter{flex:1;height:5px;background:#e8e4da;border-radius:4px;overflow:hidden;}
.washProgInner{height:100%;width:0%;background:linear-gradient(90deg,#378ADD,#1D9E75);transition:width .12s ease;border-radius:4px;}
.washProgLabel{font-size:8px;color:var(--text-muted);white-space:nowrap;min-width:40px;text-align:right;}
.bubble{position:absolute;font-size:10px;pointer-events:none;animation:bubbleUp .5s ease forwards;z-index:5;}
@keyframes bubbleUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-20px)}}

.washStatus{display:flex;align-items:center;justify-content:space-between;padding:2px 0;font-size:9px;color:var(--text-secondary);}
.washStatus .wCount{font-weight:700;color:var(--text);}
.cooldownNote{font-size:8px;color:var(--text-muted);text-align:center;min-height:12px;}

.statsRow{display:flex;gap:3px;justify-content:space-around;padding:2px 0;border-top:1px dashed var(--border);margin-top:2px;padding-top:4px;}
.statCard{flex:1;text-align:center;background:#faf8f3;border-radius:5px;padding:2px;border:1px solid var(--border);}
.statCard .sNum{font-size:12px;font-weight:700;color:var(--text);display:block;line-height:1.2;}
.statCard .sLbl{font-size:7px;color:var(--text-muted);}

.washBtnRow{display:flex;gap:5px;justify-content:center;margin:2px 0;}
.washBtnRow .mBtn{font-size:9px;padding:3px 10px;border-radius:10px;background:#f2eee2;}

.rainbowRing{position:absolute;inset:-3px;border-radius:8px;border:2px dashed #b8860b;animation:spin 3s linear infinite;pointer-events:none;}
@keyframes spin{to{transform:rotate(360deg)}}
.calming{box-shadow:inset 0 0 0 3px rgba(55,138,221,0.35)!important;}
.hint{text-align:center;font-size:7px;color:var(--text-muted);margin-top:1px;line-height:1.2;}

@media(max-width:380px){.slot{height:38px;}.sock{width:16px;height:20px;}.sockWrap{width:30px;height:32px;}h1{font-size:14px;}.topbar{font-size:9px;}.lineBox{padding-top:12px;}}
@media(max-height:640px){#game{padding:4px;}.slot{height:34px;}.sock{width:14px;height:18px;}.sockWrap{width:26px;height:28px;}h1{font-size:12px;}.topbar{margin-bottom:1px;}.subtitle{display:none;}.kidPixel{height:65%;}}
</style>
</head>
<body>
<div id="game">
<div id="banner"></div>
<h1>晾衣绳配对</h1>
<p class="subtitle">洗袜子 → 晾干配对</p>

<div class="topbar">
<div class="stats">
<span><span class="label">得分</span><span class="val" id="score">0</span></span>
<span><span class="label">等级</span><span class="val" id="level">1</span></span>
</div>
<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;">
<button id="calmBtn">🧊 <span id="calmCount">0</span></button>
<button id="soundBtn">🔊</button>
<div id="hearts"></div>
</div></div>

<div class="xpRow"><span class="xpLabel" id="xpLabel">0/5</span><div class="xpBarOuter"><div class="xpBarInner" id="xpBar"></div></div></div>
<div class="windrow"><span class="left"><span class="windIcon">🌬</span><span id="windLabel">风力 1</span></span><span class="combo" id="comboLabel"></span></div>

<div class="poleRow"><div class="pole"></div><div class="lineBox"><div class="track" id="line0Track"></div></div><div class="pole"></div></div>
<div class="sep"></div>
<div class="poleRow"><div class="pole"></div><div class="lineBox line1wrap"><div class="track" id="line1Track"></div><div id="line1Lock"><div class="lockIcon"></div><span>等级 3 解锁第二根绳</span></div></div><div class="pole"></div></div>
<div class="sepStrong"></div>

<div class="gameFill">
<div class="trayLabel">🧺 晾衣篮（已洗好的袜子，拖绳配对消除）</div>
<div id="tray"></div>

<!-- 像素风洗衣场景 -->
<div class="washSection">
<div class="washScene" id="washScene">
<img src="images/wash_kid.png" class="kidPixel waiting" id="kidChar" alt="洗袜子的小孩">
<div class="dirtyOverlay" id="dirtyOverlay"></div>
<div class="washHint" id="washHint">点击小孩洗脏袜子 🧦</div>
</div>

<div class="washProgRow">
<span class="washProgLabel" id="washProgLabel">🧼 0/0</span>
<div class="washProgOuter"><div class="washProgInner" id="washProgBar"></div></div>
</div>

<div class="washStatus">
<span>🧺 已洗 <span class="wCount" id="washCount">0</span> 双</span>
<span id="cooldownNote" class="cooldownNote">脏袜子堆在右下角 👉</span>
</div>

<div class="statsRow">
<div class="statCard"><span class="sNum" id="statWash">0</span><span class="sLbl">肥皂(已洗)</span></div>
<div class="statCard"><span class="sNum" id="statMatch">0</span><span class="sLbl">配对</span></div>
<div class="statCard"><span class="sNum" id="statCombo">0</span><span class="sLbl">最高连击</span></div>
<div class="statCard"><span class="sNum" id="statScore">0</span><span class="sLbl">得分</span></div>
</div>

<div class="washBtnRow">
<button class="mBtn" id="achieveModalBtn">🏅 成就</button>
<button class="mBtn" id="guideModalBtn">🧦 图鉴</button>
<button class="mBtn" id="lbModalBtn">🏆 排行榜</button>
</div>
</div><!-- /washSection -->
</div><!-- /gameFill -->

<div id="over">
<p class="title">游戏结束</p>
<p class="sub" id="finalScore"></p>
<button id="restartBtn">再来一局</button>
</div>
<div class="hint">🧊配对4次领肥皂 · 🪙金袜拖绳+50 · 点击小孩洗脏袜子再晾</div>
</div><!-- /game -->

<!-- 弹窗 -->
<div class="modal" id="achieveModal"><div class="modalBox"><h2>🏅 成就 <span id="achieveModalCount">0/9</span></h2><div class="achieveGrid" id="achieveGrid"></div><button class="modalClose" id="achieveModalClose">关闭</button></div></div>
<div class="modal" id="guideModal"><div class="modalBox"><h2>🧦 袜子图鉴</h2><div class="guideItem"><span class="gi">🧦</span><div><b>普通袜子</b><span class="gd">6色，相邻同色配对消除</span></div></div>
<div class="guideItem"><span class="gi">🌈</span><div><b>彩虹袜</b><span class="gd">8%概率，配任何色+20分</span></div></div>
<div class="guideItem"><span class="gi">⭐</span><div><b>星袜</b><span class="gd">7%概率，配对得分×2</span></div></div>
<div class="guideItem"><span class="gi">💣</span><div><b>炸弹袜</b><span class="gd">7%概率，引爆清自身+相邻</span></div></div>
<div class="guideItem gold"><span class="gi">🪙</span><div><b>金袜</b><span class="gd">5%概率，拖绳+50不占位</span></div></div>
<button class="modalClose" id="guideModalClose">关闭</button></div></div>
<div id="lbPanel"><div id="lbBox"><h2>🏆 排行榜</h2><div id="lbList"></div><button id="lbClose">关闭</button></div></div>

<script>
(function(){
const colors=[{n:'coral',h:'#D85A30'},{n:'teal',h:'#1D9E75'},{n:'blue',h:'#378ADD'},{n:'pink',h:'#D4537E'},{n:'purple',h:'#7F77DD'},{n:'amber',h:'#BA7517'}];
const SLOTS=7,TRAYMAX=4,LINE2_LEVEL=3,DIRTY_MAX=4,SOAP_NEED=3;
const SPEC_WEIGHTS={star:0.07,bomb:0.07,gold:0.05};

const ACHIEVEMENTS=[
{id:'first',icon:'🧦',name:'初次配对',desc:'完成第1次配对',check:()=>matches>=1},
{id:'combo5',icon:'🔥',name:'连击达人',desc:'达到5连击',check:()=>combo>=5},
{id:'bomb3',icon:'💣',name:'拆弹专家',desc:'使用3次炸弹袜',check:()=>stats.bombUsed>=3},
{id:'star5',icon:'⭐',name:'星袜猎手',desc:'配对5次星袜',check:()=>stats.starMatched>=5},
{id:'gold3',icon:'🪙',name:'淘金者',desc:'收集5次金袜',check:()=>stats.goldCollected>=5},
{id:'calm5',icon:'🧊',name:'风平浪静',desc:'使用5次稳一稳',check:()=>stats.calmUsed>=5},
{id:'rainbow3',icon:'🌈',name:'色彩大师',desc:'配对3次彩虹袜',check:()=>stats.rainbowMatched>=3},
{id:'score1k',icon:'🏆',name:'高分王',desc:'单局达到1000分',check:()=>score>=1000},
{id:'line2pro',icon:'🪢',name:'双绳大师',desc:'解锁双绳后配20对',check:()=>line2Unlocked&&stats.line2Matches>=20},
];

let lines=[new Array(SLOTS).fill(null),new Array(SLOTS).fill(null)];
let queue=[];let score=0,level=1,lives=3,matches=0,colorsUnlocked=4;
let combo=0,comboTimer=null,maxCombo=0;
let spawnTimer=null,running=true,line2Unlocked=false,soundOn=true;
let calmCharges=0,calmUntil=0,comboBank=0,xpInLevel=0,washCount=0,soapProgress=0;
let dirtyQueue=[],washProg=0;
let stats={bombUsed:0,starMatched:0,calmUsed:0,rainbowMatched:0,line2Matches:0,goldCollected:0};
let gotAchievements=[],newlyGot=[];

function washNeeded(){return Math.min(2+Math.floor((level-1)/2),5);}
function spawnRate(){return Math.max(600,2400-level*300);}

const RAINBOW='conic-gradient(#D85A30,#1D9E75,#378ADD,#D4537E,#7F77DD,#BA7517,#D85A30)';
const $=id=>document.getElementById(id);
const wrap=$('game');const track=[$('line0Track'),$('line1Track')];
const line1Lock=$('line1Lock');const tray=$('tray');
const scoreEl=$('score');const levelEl=$('level');const heartsEl=$('hearts');
const windLabel=$('windLabel');const comboLabel=$('comboLabel');const overEl=$('over');
const banner=$('banner');const soundBtn=$('soundBtn');
const calmBtn=$('calmBtn');const calmCount=$('calmCount');
const xpBar=$('xpBar');const xpLabel=$('xpLabel');
const washScene=$('washScene');const kidChar=$('kidChar');
const dirtyOverlay=$('dirtyOverlay');const washProgBar=$('washProgBar');
const washProgLabel=$('washProgLabel');const washHint=$('washHint');
const washCountEl=$('washCount');const cooldownNote=$('cooldownNote');
const statWash=$('statWash');const statMatch=$('statMatch');const statCombo=$('statCombo');const statScore=$('statScore');
const achieveGrid=$('achieveGrid');const achieveModal=$('achieveModal');
const achieveModalBtn=$('achieveModalBtn');const achieveModalClose=$('achieveModalClose');
const achieveModalCount=$('achieveModalCount');
const guideModal=$('guideModal');const guideModalBtn=$('guideModalBtn');const guideModalClose=$('guideModalClose');
const lbPanel=$('lbPanel');const lbList=$('lbList');const lbBtn=$('lbModalBtn');const lbClose=$('lbClose');

const ACH_KEY='cl_ach';const LB_KEY='cl_lb';

function loadPersistent(){try{const a=localStorage.getItem(ACH_KEY);if(a)gotAchievements=JSON.parse(a)}catch(e){}}
function saveAchievements(){try{localStorage.setItem(ACH_KEY,JSON.stringify(gotAchievements))}catch(e){}}
function loadLB(){try{return JSON.parse(localStorage.getItem(LB_KEY))||[]}catch(e){return[]}}
function saveLB(d){try{localStorage.setItem(LB_KEY,JSON.stringify(d))}catch(e){}}
function submitScore(sc,lv){const lb=loadLB();lb.push({score:sc,level:lv,date:new Date().toLocaleDateString('zh-CN')});lb.sort((a,b)=>b.score-a.score);if(lb.length>20)lb.length=20;saveLB(lb);if(typeof tt!=='undefined'&&tt.postMessage)tt.postMessage({type:'score_update',score:sc,level:lv});return lb.findIndex((e,i)=>e.score===sc&&e.level===lv&&i<20);}
function renderLB(h){const lb=loadLB();if(!lb.length){lbList.innerHTML='<p style="text-align:center;color:var(--text-muted);font-size:12px;padding:20px 0;">暂无记录</p>';return;}lbList.innerHTML=lb.slice(0,20).map((e,i)=>{const m=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);return '<div class="lbEntry'+(h!==void 0&&i===h?' me':'')+'"><span class="rank'+(i<3?' top':'')+'">'+m+'</span><span class="lbScore">'+e.score+'</span><span class="lbLevel">Lv.'+e.level+'</span><span class="lbDate">'+e.date+'</span></div>';}).join('');}

function openModal(el){el.classList.add('show');}
function closeModal(el){el.classList.remove('show');}
function onModalBgClick(e,el){if(e.target===el)closeModal(el);}
lbBtn.addEventListener('click',()=>{renderLB();openModal(lbPanel);});
lbClose.addEventListener('click',()=>closeModal(lbPanel));
lbPanel.addEventListener('click',e=>onModalBgClick(e,lbPanel));

function renderAchievements(){achieveGrid.innerHTML=ACHIEVEMENTS.map(a=>{const got=gotAchievements.includes(a.id);const isNew=newlyGot.includes(a.id);return '<div class="achieveBadge'+(got?' got':' locked')+(isNew?' newlyGot':'')+'" title="'+a.desc+'"><span class="icon">'+(got?a.icon:'🔒')+'</span><span class="aname">'+(got?a.name:'???')+'</span></div>';}).join('');achieveModalCount.textContent=gotAchievements.length+'/'+ACHIEVEMENTS.length;}
function checkAchievements(){ACHIEVEMENTS.forEach(a=>{if(gotAchievements.includes(a.id))return;if(a.check()){gotAchievements.push(a.id);newlyGot.push(a.id);saveAchievements();renderAchievements();showBanner('🏅 '+a.icon+' '+a.name);beep(880,0.3,'sine');setTimeout(()=>beep(1100,0.2,'sine'),150);}});}
achieveModalBtn.addEventListener('click',()=>{renderAchievements();openModal(achieveModal);});
achieveModalClose.addEventListener('click',()=>closeModal(achieveModal));
achieveModal.addEventListener('click',e=>onModalBgClick(e,achieveModal));
guideModalBtn.addEventListener('click',()=>openModal(guideModal));
guideModalClose.addEventListener('click',()=>closeModal(guideModal));
guideModal.addEventListener('click',e=>onModalBgClick(e,guideModal));

function addSoap(a){soapProgress+=a;const p=Math.min(100,(soapProgress/SOAP_NEED)*100);if(soapProgress>=SOAP_NEED){soapProgress-=SOAP_NEED;calmCharges=Math.min(calmCharges+1,3);updateCalmUI();showBanner('🧼 肥皂换🧊');beep(660,0.15,'sine');setTimeout(()=>beep(880,0.15,'sine'),120);}}
function updateStats(){statWash.textContent=washCount;statMatch.textContent=matches;statCombo.textContent=maxCombo;statScore.textContent=score;}

// ===== 洗衣 =====
function randColor(){if(Math.random()<0.08)return{n:'rainbow',h:RAINBOW,rainbow:true};return colors[Math.floor(Math.random()*colorsUnlocked)];}
function randSock(){const base=randColor();if(base.n!=='rainbow'){for(const[t,c]of Object.entries(SPEC_WEIGHTS)){if(Math.random()<c){base.special=t;break;}}}return base;}
function spawnDirty(){if(!running)return;if(dirtyQueue.length>=DIRTY_MAX){dirtyQueue.shift();if(dirtyQueue.length===0)washProg=0;loseLife();showBanner('一只脏袜子发霉溜走了');}dirtyQueue.push(randSock());renderDirty();}
function renderDirty(){dirtyOverlay.innerHTML='';dirtyQueue.forEach((d,i)=>{const s=document.createElement('div');s.className='dirtySock'+(i===0?' target':'');dirtyOverlay.appendChild(s);});const need=washNeeded();const p=dirtyQueue.length?(washProg/need)*100+'%':'0%';washProgBar.style.width=p;washProgLabel.textContent=dirtyQueue.length?'🧼 '+washProg+'/'+need:'🧼 0/0';}
function spawnBubble(){const b=document.createElement('span');b.className='bubble';b.textContent='💧';b.style.left=(30+Math.random()*40)+'%';b.style.bottom='40%';washScene.appendChild(b);setTimeout(()=>b.remove(),550);}

function doWash(){
if(!running||dirtyQueue.length===0){washHint.textContent='没有脏袜子，等一等～';return;}
kidChar.classList.remove('waiting');void kidChar.offsetWidth;washHint.textContent='🧼 搓一搓...';
spawnBubble();beep(380+Math.random()*100,0.08,'sine');washProg++;renderDirty();
if(washProg>=washNeeded()){
const clean=dirtyQueue.shift();washProg=0;
if(queue.length>=TRAYMAX){queue.shift();loseLife();showBanner('晾衣篮挤爆了一只！');}
queue.push(clean);renderTray();washCount++;washCountEl.textContent=washCount;updateStats();addSoap(1);
beep(700,0.16,'triangle');washHint.textContent='✅ 洗好啦！拖去晾吧';
}else{washHint.textContent='🧼 '+washProg+'/'+washNeeded()+' 继续搓...';}
renderDirty();kidChar.classList.add('waiting');
}
kidChar.addEventListener('click',doWash);
washScene.addEventListener('click',e=>{if(e.target===washScene)doWash();});

// ===== 核心 =====
function updateCalmUI(){calmCount.textContent=calmCharges;calmBtn.disabled=calmCharges<=0;calmBtn.classList.toggle('ready',calmCharges>0);}
calmBtn.addEventListener('click',()=>{if(calmCharges<=0||!running)return;calmCharges--;stats.calmUsed++;updateCalmUI();calmUntil=performance.now()+3000;showBanner('风平息了片刻');beep(520,0.2,'sine');wrap.classList.add('calming');setTimeout(()=>wrap.classList.remove('calming'),3000);checkAchievements();});
function updateXP(){const need=5;const pct=Math.min(100,(xpInLevel/need)*100);xpBar.style.width=pct+'%';xpLabel.textContent=xpInLevel+'/'+need;}
function checkLevelUp(){const need=5;if(xpInLevel>=need){xpInLevel-=need;level=Math.min(level+1,6);colorsUnlocked=Math.min(4+level-1,6);levelEl.textContent=level;updateWind();resetSpawn();updateXP();showBanner('升级到 '+level+' 级！');beep(880,0.18,'sine');maybeUnlockLine2();}}
let audioCtx=null;
function beep(f,d,t){if(!soundOn)return;try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.value=0.06;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.stop(audioCtx.currentTime+d);}catch(e){}}
soundBtn.addEventListener('click',()=>{soundOn=!soundOn;soundBtn.textContent=soundOn?'🔊':'🔇';});
function showBanner(t){banner.textContent=t;banner.classList.add('show');clearTimeout(showBanner._t);showBanner._t=setTimeout(()=>banner.classList.remove('show'),1400);}
function renderHearts(justLost){heartsEl.innerHTML='';for(let i=0;i<3;i++){const s=document.createElement('span');s.className='heart'+(i<lives?' on':'')+((justLost&&i===lives)?' lost':'');s.textContent='♥';heartsEl.appendChild(s);}}
function makeSockEl(s,ext){const e=document.createElement('div');e.className='sock'+(s.anim?' '+s.anim:'');e.style.cssText='position:absolute;top:5px;left:50%;transform:translateX(-50%);background:'+s.h+';filter:drop-shadow(0 2px 2px rgba(0,0,0,0.12));'+(ext||'');if(s.special==='star'){const b=document.createElement('span');b.className='badgeStar';b.textContent='⭐';e.appendChild(b);}else if(s.special==='bomb'){const b=document.createElement('span');b.className='badgeBomb';b.textContent='💣';e.appendChild(b);}else if(s.special==='gold'){const b=document.createElement('span');b.className='badgeGold';b.textContent='🪙';e.appendChild(b);e.style.filter='drop-shadow(0 2px 4px rgba(212,160,23,0.4))';}return e;}
function renderLine(li){const t=track[li];t.innerHTML='';lines[li].forEach((s,i)=>{const o=document.createElement('div');o.className='slot';o.dataset.idx=i;o.dataset.line=li;if(s){const c=document.createElement('div');c.className='clip';o.appendChild(c);if(s.rainbow){const r=document.createElement('div');r.className='rainbowRing';r.style.cssText+='position:absolute;top:2px;left:50%;transform:translateX(-50%);width:22px;height:22px;';o.appendChild(r);}o.appendChild(makeSockEl(s));}t.appendChild(o);});}
function renderAllLines(){renderLine(0);if(line2Unlocked)renderLine(1);}
function renderTray(){tray.innerHTML='';queue.forEach((q,i)=>{const h=document.createElement('div');h.className='sockWrap';h.dataset.qidx=i;const s=document.createElement('div');s.className='sock';s.style.background=q.h;if(q.special==='star'){const b=document.createElement('span');b.className='badgeStar';b.textContent='⭐';s.appendChild(b);}else if(q.special==='bomb'){const b=document.createElement('span');b.className='badgeBomb';b.textContent='💣';s.appendChild(b);}else if(q.special==='gold'){const b=document.createElement('span');b.className='badgeGold';b.textContent='🪙';s.appendChild(b);s.style.filter='drop-shadow(0 2px 4px rgba(212,160,23,0.4))';}h.appendChild(s);h.addEventListener('pointerdown',onDragStart);tray.appendChild(h);});}
function updateWind(){windLabel.textContent='风力 '+level;}
function popScore(s,a,c){const p=document.createElement('div');p.className='scorePop'+(c?' '+c:'');p.textContent='+'+a;s.appendChild(p);setTimeout(()=>p.remove(),720);}
function bumpCombo(){combo++;maxCombo=Math.max(maxCombo,combo);updateStats();if(combo>=2){comboLabel.textContent=combo+' 连击';comboLabel.classList.add('show');clearTimeout(comboTimer);comboTimer=setTimeout(()=>comboLabel.classList.remove('show'),1200);}checkAchievements();}
function resetCombo(){combo=0;comboLabel.classList.remove('show');}
function collectGold(li,idx,f){stats.goldCollected++;score+=50;scoreEl.textContent=score;xpInLevel++;checkLevelUp();updateXP();comboBank++;if(comboBank>=4){comboBank=0;calmCharges=Math.min(calmCharges+1,3);updateCalmUI();}if(li===1)stats.line2Matches++;matches++;if(f)lines[li][idx]=null;addSoap(1);updateStats();showBanner('🪙 +50 金袜子！');beep(880,0.1,'sine');setTimeout(()=>beep(1100,0.1,'sine'),80);const e=track[li].querySelector('[data-idx="'+idx+'"]');if(e)popScore(e,50,'goldPop');renderLine(li);checkAchievements();}
function detonateBomb(li,idx){const a=lines[li];const d=[];for(let n=-1;n<=1;n++){const i=idx+n;if(i>=0&&i<SLOTS&&a[i])d.push(i);}d.forEach(n=>{a[n].anim='pop';});renderLine(li);beep(300,0.15,'square');setTimeout(()=>{let b=0;d.forEach(n=>{if(a[n]){if(a[n].special==='star')stats.starMatched++;if(a[n].rainbow)stats.rainbowMatched++;if(a[n].special==='gold'){stats.goldCollected++;b+=50;}a[n]=null;b+=10*level;}});stats.bombUsed++;score+=b;matches+=d.length;comboBank+=d.length;scoreEl.textContent=score;xpInLevel+=d.length;checkLevelUp();updateXP();if(comboBank>=4){comboBank=0;calmCharges=Math.min(calmCharges+1,3);updateCalmUI();}addSoap(d.length);updateStats();renderLine(li);showBanner('💥 炸弹清除 '+d.length+' 个！');const e=track[li].querySelector('[data-idx="'+idx+'"]');if(e)popScore(e,b,'bombPop');checkAchievements();},320);}
function checkMatch(li,idx){const a=lines[li];const s=a[idx];if(!s)return;if(s.special==='bomb'){detonateBomb(li,idx);return;}if(s.special==='gold'){collectGold(li,idx,1);return;}[idx-1,idx+1].forEach(n=>{if(n>=0&&n<SLOTS&&a[n]&&!a[n].matched&&!s.matched&&(s.rainbow||a[n].rainbow||a[n].h===s.h)){s.matched=1;a[n].matched=1;s.anim='pop';a[n].anim='pop';renderLine(li);beep(660,0.12,'triangle');const e=track[li].querySelector('[data-idx="'+idx+'"]');bumpCombo();const sb=s.special==='star'||a[n].special==='star';const wb=(s.rainbow||a[n].rainbow)?20:0;const g=(10*level+Math.max(0,(combo-1)*5)+wb)*(sb?2:1);if(e)popScore(e,g,sb?'starPop':'');if(sb){stats.starMatched++;showBanner('⭐ 星袜双倍！');}setTimeout(()=>{a[idx]=null;a[n]=null;score+=g;matches++;comboBank++;scoreEl.textContent=score;xpInLevel++;if(s.rainbow||a[n].rainbow)stats.rainbowMatched++;if(li===1)stats.line2Matches++;checkLevelUp();updateXP();if(comboBank>=4){comboBank=0;calmCharges=Math.min(calmCharges+1,3);updateCalmUI();}addSoap(1);updateStats();renderLine(li);checkAchievements();},320);}});}
function maybeUnlockLine2(){if(!line2Unlocked&&level>=LINE2_LEVEL){line2Unlocked=true;line1Lock.style.display='none';track[1].classList.add('unlocked');showBanner('第二根绳子解锁！');}}
function loseLife(){lives--;renderHearts(true);resetCombo();beep(180,0.25,'sawtooth');if(lives<=0)endGame();}
function endGame(){running=false;overEl.style.display='block';document.getElementById('finalScore').textContent='最终得分 '+score+' · 等级 '+level+' · 洗了 '+washCount+' 双';checkAchievements();const rank=submitScore(score,level);setTimeout(()=>{renderLB(rank);openModal(lbPanel);},800);}

let ghost=null,dq=null,hs=null;
function onDragStart(e){if(!running)return;e.preventDefault();dq=parseInt(e.currentTarget.dataset.qidx);ghost=document.createElement('div');ghost.className='sock';const q=queue[dq];ghost.style.cssText='background:'+q.h+';position:absolute;pointer-events:none;z-index:20;filter:drop-shadow(0 4px 6px rgba(0,0,0,0.2));width:22px;height:28px;';if(q.special==='star'){const b=document.createElement('span');b.className='badgeStar';b.textContent='⭐';b.style.cssText='font-size:11px!important;';ghost.appendChild(b);}else if(q.special==='bomb'){const b=document.createElement('span');b.className='badgeBomb';b.textContent='💣';b.style.cssText='font-size:11px!important;';ghost.appendChild(b);}else if(q.special==='gold'){const b=document.createElement('span');b.className='badgeGold';b.textContent='🪙';b.style.cssText='font-size:13px!important;';ghost.appendChild(b);ghost.style.filter='drop-shadow(0 2px 6px rgba(212,160,23,0.5))';}wrap.appendChild(ghost);mg(e);window.addEventListener('pointermove',mg);window.addEventListener('pointerup',onDragEnd);}
function mg(e){const r=wrap.getBoundingClientRect();ghost.style.left=(e.clientX-r.left-11)+'px';ghost.style.top=(e.clientY-r.top-14)+'px';const el=document.elementFromPoint(e.clientX,e.clientY);const se=el&&el.closest?el.closest('.slot'):null;if(se!==hs){ch();if(se){const li=parseInt(se.dataset.line),idx=parseInt(se.dataset.idx);const v=(li===0||line2Unlocked)&&lines[li][idx]===null;se.classList.add(v?'hoverValid':'hoverInvalid');hs=se;}}}
function ch(){if(hs){hs.classList.remove('hoverValid','hoverInvalid');hs=null;}}
function onDragEnd(e){window.removeEventListener('pointermove',mg);window.removeEventListener('pointerup',onDragEnd);if(ghost){ghost.remove();ghost=null;}ch();const el=document.elementFromPoint(e.clientX,e.clientY);const se=el&&el.closest?el.closest('.slot'):null;const q=queue[dq];let p=false;if(se){const li=parseInt(se.dataset.line),idx=parseInt(se.dataset.idx);if((li===0||line2Unlocked)&&lines[li][idx]===null){if(q.special==='gold'){stats.goldCollected++;score+=50;scoreEl.textContent=score;xpInLevel++;checkLevelUp();updateXP();comboBank++;if(comboBank>=4){comboBank=0;calmCharges=Math.min(calmCharges+1,3);updateCalmUI();}if(li===1)stats.line2Matches++;matches++;queue.splice(dq,1);renderTray();addSoap(1);updateStats();showBanner('🪙 +50 金袜子！');beep(880,0.1,'sine');setTimeout(()=>beep(1100,0.1,'sine'),80);popScore(se,50,'goldPop');checkAchievements();p=1;}else{lines[li][idx]={h:q.h,rainbow:!!q.rainbow,special:q.special};p=1;queue.splice(dq,1);renderLine(li);renderTray();checkMatch(li,idx);}}}if(!p){queue.splice(dq,1);renderTray();loseLife();wrap.classList.add('miss');setTimeout(()=>wrap.classList.remove('miss'),300);}dq=null;}

function dirtyTick(){if(!running)return;spawnDirty();}
function resetSpawn(){clearInterval(spawnTimer);spawnTimer=setInterval(dirtyTick,spawnRate());}

function loop(t){if(running){const c=t<calmUntil;const a=(10+level*7)*(c?0.15:1);const f=(0.0009+level*0.00035)*(c?0.5:1);const s0=a*Math.sin(t*f);track[0].style.transform='translateX('+s0.toFixed(1)+'px)rotate('+(s0*0.018).toFixed(2)+'deg)';if(line2Unlocked){const s1=(a*1.15)*Math.sin(t*f*1.3+Math.PI/3);track[1].style.transform='translateX('+s1.toFixed(1)+'px)rotate('+(s1*0.018).toFixed(2)+'deg)';}}requestAnimationFrame(loop);}

function resetGame(){
lines=[new Array(SLOTS).fill(null),new Array(SLOTS).fill(null)];queue=[];score=0;level=1;lives=3;matches=0;colorsUnlocked=4;
xpInLevel=0;stats={bombUsed:0,starMatched:0,calmUsed:0,rainbowMatched:0,line2Matches:0,goldCollected:0};
maxCombo=0;washCount=0;soapProgress=0;dirtyQueue=[];washProg=0;newlyGot=[];
running=true;line2Unlocked=false;calmCharges=0;calmUntil=0;comboBank=0;
resetCombo();updateCalmUI();line1Lock.style.display='flex';overEl.style.display='none';
closeModal(lbPanel);closeModal(achieveModal);closeModal(guideModal);
scoreEl.textContent='0';levelEl.textContent='1';washCountEl.textContent='0';
updateStats();renderHearts();renderAllLines();renderTray();updateWind();updateXP();
renderDirty();washHint.textContent='点击小孩洗脏袜子 🧦';washProgBar.style.width='0%';washProgLabel.textContent='🧼 0/0';
resetSpawn();setTimeout(()=>{spawnDirty();setTimeout(()=>spawnDirty(),1500);},500);
}

document.getElementById('restartBtn').addEventListener('click',resetGame);
loadPersistent();renderAchievements();updateCalmUI();updateXP();
renderHearts();renderAllLines();updateWind();renderTray();updateStats();
renderDirty();
setTimeout(()=>{spawnDirty();setTimeout(()=>spawnDirty(),1500);},500);
resetSpawn();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
