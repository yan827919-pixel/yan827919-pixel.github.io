<!DOCTYPE html>
<html lang="zh-CN">
<head>

<script>
// 抖音小游戏 WebView 桥接
(function(){
  if(typeof tt === 'undefined') return;
  const _origGet = localStorage.getItem;
  const _origSet = localStorage.setItem;
  const _origRemove = localStorage.removeItem;
  localStorage.getItem = function(key){
    try { return tt.getStorageSync(key); } catch(e){ return _origGet.call(localStorage, key); }
  };
  localStorage.setItem = function(key, val){
    try { tt.setStorageSync(key, val); } catch(e){ _origSet.call(localStorage, key, val); }
  };
  localStorage.removeItem = function(key){
    try { tt.removeStorageSync(key); } catch(e){ _origRemove.call(localStorage, key); }
  };
  if(tt.postMessage) tt.postMessage({type:'ready'});
  console.log('🧦 晾衣绳配对 抖音模式已激活');
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>晾衣绳配对 - 抖音休闲版</title>
<style>
  :root{
    --sky-top:#bfe0f2; --sky-bottom:#eaf3e2; --ground:#c9dba0;
    --card:#fffdf8; --border:#ddd9cd; --border-strong:#a89f8c;
    --text:#2c2c2a; --text-secondary:#5f5e5a; --text-muted:#948d7c;
    --danger:#c23b3b; --wood:#a9764f; --wood-dark:#8a5d3b;
    --star:#e6b800; --bomb:#e04040; --achieve-got:#1D9E75;
    --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
  body{
    min-height:100dvh; min-height:100vh;
    padding:calc(10px + var(--safe-top)) 6px calc(20px + var(--safe-bottom));
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-bottom) 65%,var(--ground) 100%);
    color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    display:flex; justify-content:center; overflow-x:hidden;
  }
  #game{
    width:100%; max-width:480px; background:var(--card); border:1px solid var(--border);
    border-radius:16px; padding:12px 12px 18px; box-shadow:0 8px 24px rgba(60,50,30,0.08);
    position:relative; overflow:hidden;
  }
  h1{font-size:16px; font-weight:700; margin:0 0 2px; text-align:center; letter-spacing:0.5px;}
  .subtitle{text-align:center; font-size:10px; color:var(--text-muted); margin:0 0 8px;}
  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; font-size:11px; flex-wrap:wrap; gap:3px;}
  .topbar .stats{display:flex; gap:10px; align-items:center;}
  .label{color:var(--text-secondary);}
  .val{font-size:15px; font-weight:700; margin-left:2px; font-variant-numeric:tabular-nums;}
  #hearts{display:flex; gap:2px; font-size:15px;}
  .heart{color:var(--border-strong); transition:transform .2s;}
  .heart.on{color:var(--danger);}
  .heart.lost{animation:heartLost .4s ease;}
  @keyframes heartLost{0%{transform:scale(1.4)}100%{transform:scale(1)}}
  .windrow{display:flex; align-items:center; justify-content:space-between; margin-bottom:3px;}
  .windrow .left{display:flex; align-items:center; gap:4px; color:var(--text-muted); font-size:10px;}
  .combo{font-size:10px; font-weight:700; color:#c17a1f; opacity:0; transition:opacity .2s;}
  .combo.show{opacity:1;}
  .windIcon{display:inline-block; animation:blow 1.6s ease-in-out infinite;}
  @keyframes blow{0%,100%{transform:translateX(0)}50%{transform:translateX(3px)}}

  .poleRow{display:flex; align-items:flex-start; justify-content:space-between; margin-top:4px;}
  .pole{width:4px; height:10px; background:var(--wood); border-radius:2px 2px 0 0; flex-shrink:0; margin-top:-1px;}
  .lineBox{flex:1; border-top:2.5px solid var(--wood-dark); padding-top:18px; padding-bottom:3px; margin:0 2px; position:relative;}
  .track{display:flex; justify-content:space-between; position:relative;}
  .slot{width:12.5%; height:56px; position:relative; flex-shrink:0; border-radius:5px; transition:background .1s, box-shadow .1s;}
  .slot.hoverValid{background:rgba(29,158,117,0.14); box-shadow:inset 0 0 0 2px rgba(29,158,117,0.55);}
  .slot.hoverInvalid{background:rgba(194,59,59,0.12); box-shadow:inset 0 0 0 2px rgba(194,59,59,0.5);}
  .sep{border-top:1px dashed var(--border); margin:2px 0;}
  .sepStrong{height:1px; background:var(--border); margin:6px 0 10px;}
  .line1wrap{position:relative;}
  #line1Lock{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:4px; background:rgba(255,253,248,0.92); border-radius:6px; backdrop-filter:blur(1px);
  }
  #line1Lock .lockIcon{width:16px; height:16px; border:2px solid var(--text-muted); border-radius:3px; position:relative;}
  #line1Lock .lockIcon::before{content:"";position:absolute; top:-8px; left:2px; width:8px; height:8px; border:2px solid var(--text-muted); border-bottom:none; border-radius:5px 5px 0 0;}
  #line1Lock span{font-size:10px; color:var(--text-muted);}

  .trayLabel{font-size:10px; color:var(--text-secondary); margin-bottom:4px;}
  #tray{display:flex; gap:8px; min-height:36px; flex-wrap:wrap;}

  .sock{width:22px; height:28px; clip-path:polygon(22% 0%,78% 0%,78% 55%,100% 55%,100% 82%,55% 100%,0% 82%,0% 55%,22% 55%); position:relative; pointer-events:none; filter:drop-shadow(0 2px 3px rgba(0,0,0,0.15));}
  .sock::after{content:"";position:absolute; top:3px; left:0; right:0; height:2px; background:rgba(255,255,255,0.35);}
  .sockWrap{width:42px; height:44px; display:flex; align-items:center; justify-content:center; cursor:grab; touch-action:none; transition:transform .12s; border-radius:6px; position:relative;}
  .sockWrap:active{cursor:grabbing; transform:scale(1.1);}
  .clip{position:absolute; top:0; left:50%; transform:translateX(-50%); width:7px; height:5px; background:var(--wood-dark); border-radius:2px; z-index:2;}

  .badgeStar{position:absolute; top:-6px; right:-6px; font-size:11px; z-index:3; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.3)); animation:badgePop 0.4s ease;}
  .badgeBomb{position:absolute; top:-6px; right:-6px; font-size:11px; z-index:3; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.3)); animation:badgePop 0.4s ease;}
  @keyframes badgePop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}

  .scorePop{
    position:absolute; left:50%; top:-4px; transform:translateX(-50%);
    font-size:11px; font-weight:700; color:#c17a1f; pointer-events:none;
    animation:scoreFloat .7s ease forwards;
  }
  @keyframes scoreFloat{0%{opacity:0; transform:translate(-50%,4px)}20%{opacity:1}100%{opacity:0; transform:translate(-50%,-18px)}}
  .starPop{color:var(--star) !important; font-size:14px !important;}
  .bombPop{color:var(--bomb) !important; font-size:14px !important;}

  @keyframes pop{0%{transform:scale(1) translateX(-50%);opacity:1}60%{transform:scale(1.3) translateX(-50%);opacity:1}100%{transform:scale(0.15) translateX(-50%);opacity:0}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  @keyframes fadeIn{from{opacity:0; transform:translateY(-3px)}to{opacity:1; transform:translateY(0)}}
  @keyframes achievePop{0%{transform:scale(0.5)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
  .pop{animation:pop .35s ease forwards;}
  .miss{animation:shake .3s ease;}
  .unlocked{animation:fadeIn .5s ease;}

  #banner{
    position:absolute; top:6px; left:50%; transform:translateX(-50%) translateY(-140%);
    background:#2c2c2a; color:#fffdf8; font-size:11px; font-weight:600;
    padding:5px 12px; border-radius:20px; white-space:nowrap; transition:transform .35s ease; z-index:10;
  }
  #banner.show{transform:translateX(-50%) translateY(0);}

  #over{display:none; text-align:center; padding:14px 0 2px;}
  #over p.title{font-size:15px; font-weight:700; margin:0 0 2px;}
  #over p.sub{font-size:11px; color:var(--text-secondary); margin:0 0 8px;}
  button{
    font-family:inherit; font-size:12px; font-weight:600; padding:7px 16px; border-radius:8px;
    border:1px solid var(--border-strong); background:var(--card); color:var(--text); cursor:pointer;
    transition:background .15s, transform .1s;
  }
  button:hover{background:#f2eee2;}
  button:active{transform:scale(0.97);}
  #restartBtn{display:block; margin:0 auto 6px;}
  #soundBtn{font-size:14px; padding:2px 7px; border-radius:5px;}
  #calmBtn{font-size:10px; padding:2px 8px; display:flex; align-items:center; gap:3px;}
  #calmBtn:disabled{opacity:0.4; cursor:not-allowed;}
  #calmBtn.ready{box-shadow:0 0 0 2px rgba(55,138,221,0.4);}

  /* 排行榜 */
  .lbBtnWrap{display:flex; gap:6px; justify-content:center; margin-bottom:6px;}
  #lbBtn{font-size:10px; padding:3px 12px; border-radius:12px; background:#f2eee2;}
  #lbBtn:active{transform:scale(0.97);}
  #lbPanel{
    display:none; position:fixed; inset:0; z-index:50;
    background:rgba(0,0,0,0.45); backdrop-filter:blur(3px);
    justify-content:center; align-items:center; padding:20px;
  }
  #lbPanel.show{display:flex;}
  #lbBox{
    background:var(--card); border-radius:16px; width:100%; max-width:380px;
    max-height:80vh; overflow-y:auto; padding:16px 16px 12px;
    box-shadow:0 12px 40px rgba(0,0,0,0.2);
  }
  #lbBox h2{font-size:15px; text-align:center; margin:0 0 10px;}
  .lbEntry{display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:6px; margin-bottom:3px; font-size:12px;}
  .lbEntry:nth-child(1){background:#fff3cd;}
  .lbEntry:nth-child(2){background:#f0f0f0;}
  .lbEntry:nth-child(3){background:#fce4d6;}
  .lbEntry .rank{font-weight:700; width:24px; text-align:center; color:var(--text-muted);}
  .lbEntry .rank.top{font-size:14px;}
  .lbEntry .lbScore{font-weight:700; flex:1; text-align:right;}
  .lbEntry .lbLevel{color:var(--text-muted); font-size:10px;}
  .lbEntry .lbDate{color:var(--text-muted); font-size:9px; min-width:60px; text-align:right;}
  .lbEntry.me{border:1.5px solid #378ADD;}
  #lbClose{display:block; margin:8px auto 0; font-size:11px; padding:4px 20px;}

  /* 成就系统 */
  .achieveSection{
    margin-top:10px; border-top:1px dashed var(--border); padding-top:8px;
  }
  .achieveTitle{
    font-size:10px; color:var(--text-muted); margin-bottom:5px; display:flex; align-items:center; gap:4px;
  }
  .achieveTitle .count{color:var(--achieve-got); font-weight:700;}
  .achieveGrid{
    display:flex; gap:6px; flex-wrap:wrap; min-height:40px;
  }
  .achieveBadge{
    width:58px; height:54px; border-radius:8px; border:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-size:9px; color:var(--text-muted); gap:2px; transition:all .2s; cursor:default;
    background:#fcfaf6;
  }
  .achieveBadge .icon{font-size:16px; line-height:1;}
  .achieveBadge .aname{font-size:7.5px; line-height:1.1; text-align:center; max-width:50px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .achieveBadge.got{
    border-color:var(--achieve-got); background:#e8f5ee;
    animation:achievePop .4s ease;
  }
  .achieveBadge.got .icon{filter:none;}
  .achieveBadge.got .aname{color:var(--achieve-got); font-weight:600;}
  .achieveBadge.locked{opacity:0.5; filter:grayscale(0.7);}
  .achieveBadge.newlyGot{box-shadow:0 0 0 2px var(--star);}

  .rainbowRing{position:absolute; inset:-3px; border-radius:8px; border:2px dashed #b8860b; animation:spin 3s linear infinite; pointer-events:none;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .calming{box-shadow:inset 0 0 0 3px rgba(55,138,221,0.35) !important;}
  .rainbowSock{background:linear-gradient(135deg,#D85A30,#BA7517,#1D9E75,#378ADD,#7F77DD,#D4537E)!important; background-size:300% 300%; animation:rainbowShift 2.4s linear infinite, popIdle 1.6s ease-in-out infinite;}
  @keyframes rainbowShift{0%{background-position:0% 50%}100%{background-position:100% 50%}}
  @keyframes popIdle{0%,100%{filter:drop-shadow(0 2px 3px rgba(0,0,0,0.15)) drop-shadow(0 0 4px rgba(255,255,255,0.6))}50%{filter:drop-shadow(0 2px 3px rgba(0,0,0,0.15)) drop-shadow(0 0 8px rgba(255,255,255,0.9))}}
  .hint{text-align:center; font-size:9.5px; color:var(--text-muted); margin-top:8px; line-height:1.5;}

  .xpRow{display:flex; align-items:center; gap:6px; margin:2px 0 4px;}
  .xpRow .xpLabel{font-size:9px; color:var(--text-muted); white-space:nowrap;}
  .xpBarOuter{flex:1; height:5px; background:#e8e4da; border-radius:4px; overflow:hidden;}
  .xpBarInner{height:100%; width:0%; background:linear-gradient(90deg,#1D9E75,#378ADD); border-radius:4px; transition:width .3s ease;}

  @media(max-width:380px){
    #game{padding:10px 8px 14px;}
    .slot{height:48px;}
    .sock{width:18px; height:24px;}
    .sockWrap{width:36px; height:38px;}
    h1{font-size:14px;}
    .topbar{font-size:10px;}
    .lineBox{padding-top:14px;}
    #lbBox{max-width:100%; margin:0 8px;}
    .achieveBadge{width:50px; height:46px;}
    .achieveBadge .icon{font-size:14px;}
    .achieveBadge .aname{font-size:7px;}
  }
  @media(max-height:640px){
    #game{padding:8px 8px 12px;}
    .slot{height:44px;}
    .sock{width:17px; height:22px;}
    .sockWrap{width:34px; height:34px;}
    h1{font-size:13px; margin-bottom:1px;}
    .topbar{margin-bottom:3px;}
    .subtitle{display:none;}
    .achieveBadge{width:46px; height:42px;}
    .achieveBadge .icon{font-size:13px;}
    .achieveBadge .aname{display:none;}
  }
</style>
</head>
<body>
<div id="game">
  <div id="banner"></div>
  <h1>晾衣绳配对</h1>
  <p class="subtitle">拖动袜子配对消除，⭐星袜双倍·💣炸弹清邻</p>

  <div class="topbar">
    <div class="stats">
      <span><span class="label">得分</span><span class="val" id="score">0</span></span>
      <span><span class="label">等级</span><span class="val" id="level">1</span></span>
    </div>
    <div style="display:flex; align-items:center; gap:5px; flex-wrap:wrap;">
      <button id="calmBtn" title="消耗能量短暂止风">🧊 <span id="calmCount">0</span></button>
      <button id="soundBtn" title="开关音效">🔊</button>
      <div id="hearts"></div>
    </div>
  </div>

  <div class="xpRow">
    <span class="xpLabel" id="xpLabel">0/5</span>
    <div class="xpBarOuter"><div class="xpBarInner" id="xpBar"></div></div>
  </div>

  <div class="windrow">
    <span class="left"><span class="windIcon">🌬</span><span id="windLabel">风力 1</span></span>
    <span class="combo" id="comboLabel"></span>
  </div>

  <div class="poleRow">
    <div class="pole"></div>
    <div class="lineBox">
      <div class="track" id="line0Track"></div>
    </div>
    <div class="pole"></div>
  </div>
  <div class="sep"></div>
  <div class="poleRow">
    <div class="pole"></div>
    <div class="lineBox line1wrap">
      <div class="track" id="line1Track"></div>
      <div id="line1Lock">
        <div class="lockIcon"></div>
        <span>等级 3 解锁第二根绳</span>
      </div>
    </div>
    <div class="pole"></div>
  </div>
  <div class="sepStrong"></div>

  <div class="trayLabel">下一批袜子（拖到绳上，相邻同色消除）</div>
  <div id="tray"></div>

  <div id="over">
    <p class="title">游戏结束</p>
    <p class="sub" id="finalScore"></p>
    <button id="restartBtn">再来一局</button>
    <div class="lbBtnWrap">
      <button id="lbBtn">🏆 排行榜</button>
    </div>
  </div>

  <!-- 成就系统（填底部空间） -->
  <div class="achieveSection">
    <div class="achieveTitle">🏅 成就 <span class="count" id="achieveCount">0/8</span></div>
    <div class="achieveGrid" id="achieveGrid"></div>
  </div>

  <div class="hint">绳子随风摇摆，等级越高越猛。⭐星袜配对方双倍得分，💣炸弹袜消除自身+相邻。每配对4次攒1点"稳一稳"能量（🧊）。在抖音中打开自动记录排行榜。收集成就解锁更多乐趣！</div>
</div>

<!-- 排行榜弹窗 -->
<div id="lbPanel">
  <div id="lbBox">
    <h2>🏆 排行榜</h2>
    <div id="lbList"></div>
    <button id="lbClose">关闭</button>
  </div>
</div>

<script>
(function(){
  const colors=[
    {n:'coral',h:'#D85A30'},{n:'teal',h:'#1D9E75'},{n:'blue',h:'#378ADD'},
    {n:'pink',h:'#D4537E'},{n:'purple',h:'#7F77DD'},{n:'amber',h:'#BA7517'}
  ];
  const SLOTS=7, TRAYMAX=4, LINE2_LEVEL=3;
  const SPECIAL_CHANCE=0.15;
  const SPECIAL_TYPES=['star','bomb'];

  // 成就定义
  const ACHIEVEMENTS=[
    {id:'first', icon:'🧦', name:'初次配对', desc:'完成第1次配对', check:()=>matches>=1},
    {id:'combo5', icon:'🔥', name:'连击达人', desc:'达到5连击', check:()=>combo>=5},
    {id:'bomb3', icon:'💣', name:'拆弹专家', desc:'使用3次炸弹袜', check:()=>stats.bombUsed>=3},
    {id:'star5', icon:'⭐', name:'星袜猎手', desc:'配对5次星袜', check:()=>stats.starMatched>=5},
    {id:'calm5', icon:'🧊', name:'风平浪静', desc:'使用5次稳一稳', check:()=>stats.calmUsed>=5},
    {id:'rainbow3', icon:'🌈', name:'色彩大师', desc:'配对3次彩虹袜', check:()=>stats.rainbowMatched>=3},
    {id:'score1k', icon:'🏆', name:'高分王', desc:'单局达到1000分', check:()=>score>=1000},
    {id:'line2pro', icon:'🪢', name:'双绳大师', desc:'解锁双绳后配20对', check:()=>line2Unlocked && stats.line2Matches>=20},
  ];

  let lines=[new Array(SLOTS).fill(null), new Array(SLOTS).fill(null)];
  let queue=[]; let score=0, level=1, lives=3, matches=0, colorsUnlocked=4;
  let combo=0, comboTimer=null;
  let spawnTimer=null, running=true, line2Unlocked=false, soundOn=true;
  let calmCharges=0, calmUntil=0, comboBank=0;
  let xpInLevel=0;
  // 跨局统计数据（存localStorage）
  let globalStats={bombUsed:0,starMatched:0,calmUsed:0,rainbowMatched:0,line2Matches:0};
  // 本局统计（用于成就检查）
  let stats={bombUsed:0,starMatched:0,calmUsed:0,rainbowMatched:0,line2Matches:0};
  let gotAchievements=[]; // id数组，持久化
  let newlyGot=[]; // 本局新获得的

  const RAINBOW='conic-gradient(#D85A30,#1D9E75,#378ADD,#D4537E,#7F77DD,#BA7517,#D85A30)';

  const wrap=document.getElementById('game');
  const track=[document.getElementById('line0Track'),document.getElementById('line1Track')];
  const line1Lock=document.getElementById('line1Lock');
  const tray=document.getElementById('tray');
  const scoreEl=document.getElementById('score');
  const levelEl=document.getElementById('level');
  const heartsEl=document.getElementById('hearts');
  const windLabel=document.getElementById('windLabel');
  const comboLabel=document.getElementById('comboLabel');
  const overEl=document.getElementById('over');
  const banner=document.getElementById('banner');
  const soundBtn=document.getElementById('soundBtn');
  const calmBtn=document.getElementById('calmBtn');
  const calmCount=document.getElementById('calmCount');
  const xpBar=document.getElementById('xpBar');
  const xpLabel=document.getElementById('xpLabel');
  const lbPanel=document.getElementById('lbPanel');
  const lbList=document.getElementById('lbList');
  const lbBtn=document.getElementById('lbBtn');
  const lbClose=document.getElementById('lbClose');
  const achieveGrid=document.getElementById('achieveGrid');
  const achieveCount=document.getElementById('achieveCount');

  const LB_KEY='clothesline_lb';
  const ACH_KEY='clothesline_ach';
  const STAT_KEY='clothesline_stat';
  const ACH_KEYS={got:ACH_KEY,stat:STAT_KEY};

  // ====== 持久化 ======
  function loadPersistent(){
    try{
      const a=localStorage.getItem(ACH_KEYS.got);
      if(a) gotAchievements=JSON.parse(a);
      const s=localStorage.getItem(ACH_KEYS.stat);
      if(s) globalStats=JSON.parse(s);
    }catch(e){}
  }
  function savePersistent(){
    try{
      localStorage.setItem(ACH_KEYS.got,JSON.stringify(gotAchievements));
      localStorage.setItem(ACH_KEYS.stat,JSON.stringify(globalStats));
    }catch(e){}
  }

  // ====== 排行榜 ======
  function loadLeaderboard(){
    try{ return JSON.parse(localStorage.getItem(LB_KEY))||[]; }catch(e){return [];}
  }
  function saveLeaderboard(data){
    try{ localStorage.setItem(LB_KEY,JSON.stringify(data)); }catch(e){}
  }
  function submitScore(sc,lv){
    const lb=loadLeaderboard();
    lb.push({score:sc,level:lv,date:new Date().toLocaleDateString('zh-CN')});
    lb.sort((a,b)=>b.score-a.score);
    if(lb.length>20) lb.length=20;
    saveLeaderboard(lb);
    if(typeof tt!=='undefined' && tt.postMessage){
      tt.postMessage({type:'score_update', score:sc, level:lv});
    }
    const idx=lb.findIndex(e=>e.score===sc && e.level===lv && e.date===lb.find(x=>x.score===sc && x.level===lv).date);
    return idx;
  }
  function renderLeaderboard(highlight){
    const lb=loadLeaderboard();
    if(!lb.length){ lbList.innerHTML='<p style="text-align:center;color:var(--text-muted);font-size:12px;padding:20px 0;">暂无记录，快去玩一局吧！</p>'; return; }
    lbList.innerHTML=lb.slice(0,20).map((e,i)=>{
      const isMe=(highlight!==undefined && i===highlight);
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
      return '<div class="lbEntry'+(isMe?' me':'')+'">'
        +'<span class="rank'+(i<3?' top':'')+'">'+medal+'</span>'
        +'<span class="lbScore">'+e.score+'</span>'
        +'<span class="lbLevel">Lv.'+e.level+'</span>'
        +'<span class="lbDate">'+e.date+'</span>'
        +'</div>';
    }).join('');
  }

  lbBtn.addEventListener('click',()=>{
    renderLeaderboard();
    lbPanel.classList.add('show');
  });
  lbClose.addEventListener('click',()=>lbPanel.classList.remove('show'));
  lbPanel.addEventListener('click',(e)=>{ if(e.target===lbPanel) lbPanel.classList.remove('show'); });

  // ====== 成就系统 ======
  function renderAchievements(){
    achieveGrid.innerHTML=ACHIEVEMENTS.map(a=>{
      const got=gotAchievements.includes(a.id);
      const isNew=newlyGot.includes(a.id);
      return '<div class="achieveBadge'+(got?' got':' locked')+(isNew?' newlyGot':'')+'" title="'+a.desc+'">'
        +'<span class="icon">'+(got?a.icon:'🔒')+'</span>'
        +'<span class="aname">'+(got?a.name:'???')+'</span>'
        +'</div>';
    }).join('');
    achieveCount.textContent=gotAchievements.length+'/8';
  }
  function checkAchievements(){
    ACHIEVEMENTS.forEach(a=>{
      if(gotAchievements.includes(a.id)) return;
      if(a.check()){
        gotAchievements.push(a.id);
        newlyGot.push(a.id);
        // 全局加总跨局统计
        globalStats.bombUsed=Math.max(globalStats.bombUsed,stats.bombUsed);
        globalStats.starMatched=Math.max(globalStats.starMatched,stats.starMatched);
        globalStats.calmUsed=Math.max(globalStats.calmUsed,stats.calmUsed);
        globalStats.rainbowMatched=Math.max(globalStats.rainbowMatched,stats.rainbowMatched);
        globalStats.line2Matches=Math.max(globalStats.line2Matches,stats.line2Matches);
        savePersistent();
        renderAchievements();
        showBanner('🏅 解锁成就：'+a.icon+' '+a.name);
        beep(880,0.3,'sine');
        setTimeout(()=>beep(1100,0.2,'sine'),150);
      }
    });
  }

  // ====== 核心逻辑 ======
  function updateCalmUI(){
    calmCount.textContent=calmCharges;
    calmBtn.disabled=calmCharges<=0;
    calmBtn.classList.toggle('ready',calmCharges>0);
  }
  calmBtn.addEventListener('click',()=>{
    if(calmCharges<=0 || !running) return;
    calmCharges--;
    stats.calmUsed++;
    updateCalmUI();
    calmUntil=performance.now()+3000;
    showBanner('风平息了片刻');
    beep(520,0.2,'sine');
    wrap.classList.add('calming');
    setTimeout(()=>wrap.classList.remove('calming'),3000);
    checkAchievements();
  });

  function updateXP(){
    const need=5;
    const pct=Math.min(100,(xpInLevel/need)*100);
    xpBar.style.width=pct+'%';
    xpLabel.textContent=xpInLevel+'/'+need;
  }
  function checkLevelUp(){
    const need=5;
    if(xpInLevel>=need){
      xpInLevel-=need;
      level=Math.min(level+1,6);
      colorsUnlocked=Math.min(4+level-1,6);
      levelEl.textContent=level;
      updateWind();
      resetSpawn();
      updateXP();
      showBanner('升级到 '+level+' 级！');
      beep(880,0.18,'sine');
      maybeUnlockLine2();
    }
  }

  let audioCtx=null;
  function beep(freq,dur,type){
    if(!soundOn) return;
    try{
      if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type=type||'sine'; o.frequency.value=freq;
      g.gain.value=0.06;
      o.connect(g); g.connect(audioCtx.destination);
      o.start();
      g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
      o.stop(audioCtx.currentTime+dur);
    }catch(e){}
  }
  soundBtn.addEventListener('click',()=>{
    soundOn=!soundOn;
    soundBtn.textContent=soundOn?'🔊':'🔇';
  });

  function showBanner(text){
    banner.textContent=text;
    banner.classList.add('show');
    clearTimeout(showBanner._t);
    showBanner._t=setTimeout(()=>banner.classList.remove('show'),1400);
  }

  function randColor(){
    if(Math.random()<0.08) return {n:'rainbow',h:RAINBOW,rainbow:true};
    return colors[Math.floor(Math.random()*colorsUnlocked)];
  }
  function randSock(){
    const base=randColor();
    if(Math.random()<SPECIAL_CHANCE && base.n!=='rainbow'){
      base.special=SPECIAL_TYPES[Math.floor(Math.random()*SPECIAL_TYPES.length)];
    }
    return base;
  }

  function renderHearts(justLost){
    heartsEl.innerHTML='';
    for(let i=0;i<3;i++){
      const s=document.createElement('span');
      s.className='heart'+(i<lives?' on':'')+((justLost && i===lives)?' lost':'');
      s.textContent='♥';
      heartsEl.appendChild(s);
    }
  }

  function renderLine(li){
    const t=track[li];
    t.innerHTML='';
    lines[li].forEach((s,i)=>{
      const slot=document.createElement('div');
      slot.className='slot'; slot.dataset.idx=i; slot.dataset.line=li;
      if(s){
        const clip=document.createElement('div');
        clip.className='clip';
        slot.appendChild(clip);
        const sock=document.createElement('div');
        sock.className='sock'+(s.anim?(' '+s.anim):'');
        sock.style.cssText='position:absolute;top:5px;left:50%;transform:translateX(-50%);background:'+s.h+';filter:drop-shadow(0 2px 2px rgba(0,0,0,0.12));';
        if(s.special==='star'){
          const badge=document.createElement('span');
          badge.className='badgeStar'; badge.textContent='⭐';
          sock.appendChild(badge);
        }else if(s.special==='bomb'){
          const badge=document.createElement('span');
          badge.className='badgeBomb'; badge.textContent='💣';
          sock.appendChild(badge);
        }
        if(s.rainbow){
          const ring=document.createElement('div');
          ring.className='rainbowRing';
          ring.style.cssText+='position:absolute;top:2px;left:50%;transform:translateX(-50%);width:26px;height:26px;';
          slot.appendChild(ring);
        }
        slot.appendChild(sock);
      }
      t.appendChild(slot);
    });
  }
  function renderAllLines(){ renderLine(0); if(line2Unlocked) renderLine(1); }

  function renderTray(){
    tray.innerHTML='';
    queue.forEach((q,i)=>{
      const handle=document.createElement('div');
      handle.className='sockWrap';
      handle.dataset.qidx=i;
      const sock=document.createElement('div');
      sock.className='sock';
      sock.style.background=q.h;
      if(q.special==='star'){
        const badge=document.createElement('span');
        badge.className='badgeStar'; badge.textContent='⭐';
        sock.appendChild(badge);
      }else if(q.special==='bomb'){
        const badge=document.createElement('span');
        badge.className='badgeBomb'; badge.textContent='💣';
        sock.appendChild(badge);
      }
      handle.appendChild(sock);
      handle.addEventListener('pointerdown',onDragStart);
      tray.appendChild(handle);
    });
  }

  function updateWind(){ windLabel.textContent='风力 '+level; }

  function popScore(slotEl,amount,cls){
    const p=document.createElement('div');
    p.className='scorePop'+(cls?' '+cls:'');
    p.textContent='+'+amount;
    slotEl.appendChild(p);
    setTimeout(()=>p.remove(),720);
  }

  function bumpCombo(){
    combo++;
    if(combo>=2){
      comboLabel.textContent=combo+' 连击';
      comboLabel.classList.add('show');
      clearTimeout(comboTimer);
      comboTimer=setTimeout(()=>comboLabel.classList.remove('show'),1200);
    }
    checkAchievements(); // combo5
  }
  function resetCombo(){
    combo=0;
    comboLabel.classList.remove('show');
  }

  function detonateBomb(li,idx){
    const arr=lines[li];
    const affected=[];
    for(let d=-1;d<=1;d++){
      const n=idx+d;
      if(n>=0 && n<SLOTS && arr[n]) affected.push(n);
    }
    affected.forEach(n=>{ arr[n].anim='pop'; });
    renderLine(li);
    beep(300,0.15,'square');
    setTimeout(()=>{
      let bonus=0;
      affected.forEach(n=>{
        if(arr[n]){
          if(arr[n].special==='star') stats.starMatched++;
          if(arr[n].rainbow) stats.rainbowMatched++;
          arr[n]=null;
          bonus+=10*level;
        }
      });
      stats.bombUsed++;
      score+=bonus;
      matches+=affected.length;
      comboBank+=affected.length;
      scoreEl.textContent=score;
      xpInLevel+=affected.length;
      checkLevelUp();
      updateXP();
      if(comboBank>=4){ comboBank=0; calmCharges=Math.min(calmCharges+1,3); updateCalmUI(); }
      renderLine(li);
      showBanner('💥 炸弹清除 '+affected.length+' 个！');
      const slotEl=track[li].querySelector('[data-idx="'+idx+'"]');
      if(slotEl) popScore(slotEl,bonus,'bombPop');
      checkAchievements();
    },320);
  }

  function checkMatch(li,idx){
    const arr=lines[li];
    const s=arr[idx];
    if(!s) return;

    if(s.special==='bomb'){
      detonateBomb(li,idx);
      return;
    }

    [idx-1,idx+1].forEach(n=>{
      if(n>=0 && n<SLOTS && arr[n] && !arr[n].matched && !s.matched && (s.rainbow || arr[n].rainbow || arr[n].h===s.h)){
        s.matched=true; arr[n].matched=true;
        s.anim='pop'; arr[n].anim='pop';
        renderLine(li);
        beep(660,0.12,'triangle');
        const slotEl=track[li].querySelector('[data-idx="'+idx+'"]');
        bumpCombo();

        const starBonus=(s.special==='star'||arr[n].special==='star');
        const wildcardBonus=(s.rainbow||arr[n].rainbow)?20:0;
        const gained=(10*level+Math.max(0,(combo-1)*5)+wildcardBonus)*(starBonus?2:1);
        if(slotEl) popScore(slotEl,gained,starBonus?'starPop':'');
        if(starBonus) { stats.starMatched++; showBanner('⭐ 星袜双倍！'); }

        setTimeout(()=>{
          arr[idx]=null; arr[n]=null;
          score+=gained; matches++;
          comboBank++;
          scoreEl.textContent=score;
          xpInLevel++;
          if(s.rainbow||arr[n].rainbow) stats.rainbowMatched++;
          // 双绳统计
          if(li===1) stats.line2Matches++;
          checkLevelUp();
          updateXP();
          if(comboBank>=4){ comboBank=0; calmCharges=Math.min(calmCharges+1,3); updateCalmUI(); }
          renderLine(li);
          checkAchievements();
        },320);
      }
    });
  }

  function maybeUnlockLine2(){
    if(!line2Unlocked && level>=LINE2_LEVEL){
      line2Unlocked=true;
      line1Lock.style.display='none';
      track[1].classList.add('unlocked');
      showBanner('第二根绳子解锁！');
    }
  }

  function loseLife(){
    lives--; renderHearts(true);
    resetCombo();
    beep(180,0.25,'sawtooth');
    if(lives<=0){ endGame(); }
  }

  function endGame(){
    running=false;
    clearInterval(spawnTimer);
    checkAchievements(); // 最后检查一次（如score1k）
    overEl.style.display='block';
    document.getElementById('finalScore').textContent='最终得分 '+score+' · 到达等级 '+level+' · 成就 '+gotAchievements.length+'/8';
    const rank=submitScore(score,level);
    setTimeout(()=>{
      renderLeaderboard(rank);
      lbPanel.classList.add('show');
    },800);
  }

  let ghost=null, dragQidx=null, hoverSlotEl=null;
  function onDragStart(e){
    if(!running) return;
    e.preventDefault();
    dragQidx=parseInt(e.currentTarget.dataset.qidx);
    ghost=document.createElement('div');
    ghost.className='sock';
    ghost.style.cssText='background:'+queue[dragQidx].h+';position:absolute;pointer-events:none;z-index:20;filter:drop-shadow(0 4px 6px rgba(0,0,0,0.2));width:26px;height:32px;';
    const q=queue[dragQidx];
    if(q.special==='star'){
      const badge=document.createElement('span');
      badge.className='badgeStar'; badge.textContent='⭐';
      badge.style.cssText='font-size:13px !important;';
      ghost.appendChild(badge);
    }else if(q.special==='bomb'){
      const badge=document.createElement('span');
      badge.className='badgeBomb'; badge.textContent='💣';
      badge.style.cssText='font-size:13px !important;';
      ghost.appendChild(badge);
    }
    wrap.appendChild(ghost);
    moveGhost(e);
    window.addEventListener('pointermove',moveGhost);
    window.addEventListener('pointerup',onDragEnd);
  }
  function clearHover(){
    if(hoverSlotEl){
      hoverSlotEl.classList.remove('hoverValid','hoverInvalid');
      hoverSlotEl=null;
    }
  }
  function moveGhost(e){
    const rect=wrap.getBoundingClientRect();
    ghost.style.left=(e.clientX-rect.left-13)+'px';
    ghost.style.top=(e.clientY-rect.top-16)+'px';
    const el=document.elementFromPoint(e.clientX,e.clientY);
    const slotEl=el && el.closest ? el.closest('.slot') : null;
    if(slotEl!==hoverSlotEl){
      clearHover();
      if(slotEl){
        const li=parseInt(slotEl.dataset.line);
        const idx=parseInt(slotEl.dataset.idx);
        const valid=(li===0 || line2Unlocked) && lines[li][idx]===null;
        slotEl.classList.add(valid?'hoverValid':'hoverInvalid');
        hoverSlotEl=slotEl;
      }
    }
  }
  function onDragEnd(e){
    window.removeEventListener('pointermove',moveGhost);
    window.removeEventListener('pointerup',onDragEnd);
    if(ghost){ ghost.remove(); ghost=null; }
    clearHover();
    const el=document.elementFromPoint(e.clientX,e.clientY);
    const slotEl=el && el.closest ? el.closest('.slot') : null;
    const q=queue[dragQidx];
    let placed=false;
    if(slotEl){
      const li=parseInt(slotEl.dataset.line);
      const idx=parseInt(slotEl.dataset.idx);
      if((li===0 || line2Unlocked) && lines[li][idx]===null){
        lines[li][idx]={h:q.h, rainbow:!!q.rainbow, special:q.special};
        placed=true;
        queue.splice(dragQidx,1);
        renderLine(li); renderTray();
        checkMatch(li,idx);
      }
    }
    if(!placed){
      queue.splice(dragQidx,1);
      renderTray();
      loseLife();
      wrap.classList.add('miss');
      setTimeout(()=>wrap.classList.remove('miss'),300);
    }
    dragQidx=null;
  }

  function spawnTick(){
    if(!running) return;
    if(queue.length>=TRAYMAX){
      queue.shift();
      loseLife();
    }
    queue.push(randSock());
    renderTray();
  }

  function resetSpawn(){
    clearInterval(spawnTimer);
    const interval=Math.max(600,2400-level*300);
    spawnTimer=setInterval(spawnTick,interval);
  }

  function loop(t){
    if(running){
      const calm=t<calmUntil;
      const amp=(10+level*7)*(calm?0.15:1);
      const freq=(0.0009+level*0.00035)*(calm?0.5:1);
      const sway0=amp*Math.sin(t*freq);
      track[0].style.transform='translateX('+sway0.toFixed(1)+'px) rotate('+(sway0*0.018).toFixed(2)+'deg)';
      if(line2Unlocked){
        const sway1=(amp*1.15)*Math.sin(t*freq*1.3+Math.PI/3);
        track[1].style.transform='translateX('+sway1.toFixed(1)+'px) rotate('+(sway1*0.018).toFixed(2)+'deg)';
      }
    }
    requestAnimationFrame(loop);
  }

  function resetGame(){
    lines=[new Array(SLOTS).fill(null), new Array(SLOTS).fill(null)];
    queue=[]; score=0; level=1; lives=3; matches=0; colorsUnlocked=4;
    xpInLevel=0; stats={bombUsed:0,starMatched:0,calmUsed:0,rainbowMatched:0,line2Matches:0};
    newlyGot=[];
    running=true; line2Unlocked=false;
    calmCharges=0; calmUntil=0; comboBank=0;
    resetCombo();
    updateCalmUI();
    line1Lock.style.display='flex';
    overEl.style.display='none';
    lbPanel.classList.remove('show');
    scoreEl.textContent='0'; levelEl.textContent='1';
    renderHearts(); renderAllLines(); renderTray(); updateWind();
    updateXP();
    for(let i=0;i<3;i++) spawnTick();
    resetSpawn();
  }

  document.getElementById('restartBtn').addEventListener('click',resetGame);

  // 初始化
  loadPersistent();
  renderAchievements();
  updateCalmUI();
  updateXP();
  renderHearts(); renderAllLines(); updateWind();
  for(let i=0;i<3;i++) spawnTick();
  resetSpawn();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
