<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>晾衣绳配对</title>
<style>
  :root{
    --sky-top:#bfe0f2; --sky-bottom:#eaf3e2; --ground:#c9dba0;
    --card:#fffdf8; --border:#ddd9cd; --border-strong:#a89f8c;
    --text:#2c2c2a; --text-secondary:#5f5e5a; --text-muted:#948d7c;
    --danger:#c23b3b; --wood:#a9764f; --wood-dark:#8a5d3b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; padding:16px 10px 40px;
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-bottom) 70%,var(--ground) 100%);
    color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    display:flex; justify-content:center;
  }
  #game{
    width:100%; max-width:430px; background:var(--card); border:1px solid var(--border);
    border-radius:18px; padding:16px 16px 20px; box-shadow:0 10px 30px rgba(60,50,30,0.08);
    position:relative; overflow:hidden;
  }
  h1{font-size:19px; font-weight:700; margin:0 0 4px; text-align:center; letter-spacing:0.5px;}
  .subtitle{text-align:center; font-size:12px; color:var(--text-muted); margin:0 0 16px;}
  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; font-size:13px;}
  .topbar .stats{display:flex; gap:18px; align-items:center;}
  .label{color:var(--text-secondary);}
  .val{font-size:19px; font-weight:700; margin-left:4px; font-variant-numeric:tabular-nums;}
  #hearts{display:flex; gap:3px; font-size:19px;}
  .heart{color:var(--border-strong); transition:transform .2s;}
  .heart.on{color:var(--danger);}
  .heart.lost{animation:heartLost .4s ease;}
  @keyframes heartLost{0%{transform:scale(1.4)}100%{transform:scale(1)}}
  .windrow{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;}
  .windrow .left{display:flex; align-items:center; gap:6px; color:var(--text-muted); font-size:12px;}
  .combo{font-size:12px; font-weight:700; color:#c17a1f; opacity:0; transition:opacity .2s;}
  .combo.show{opacity:1;}
  .windIcon{display:inline-block; animation:blow 1.6s ease-in-out infinite;}
  @keyframes blow{0%,100%{transform:translateX(0)}50%{transform:translateX(3px)}}

  .poleRow{display:flex; align-items:flex-start; justify-content:space-between; margin-top:8px;}
  .pole{width:6px; height:14px; background:var(--wood); border-radius:2px 2px 0 0; flex-shrink:0; margin-top:-2px;}
  .lineBox{flex:1; border-top:3px solid var(--wood-dark); padding-top:26px; padding-bottom:6px; margin:0 4px; position:relative;}
  .track{display:flex; justify-content:space-between; position:relative;}
  .slot{width:12.5%; height:72px; position:relative; flex-shrink:0; border-radius:8px; transition:background .1s, box-shadow .1s;}
  .slot.hoverValid{background:rgba(29,158,117,0.14); box-shadow:inset 0 0 0 2px rgba(29,158,117,0.55);}
  .slot.hoverInvalid{background:rgba(194,59,59,0.12); box-shadow:inset 0 0 0 2px rgba(194,59,59,0.5);}
  .sep{border-top:1px dashed var(--border); margin:4px 0;}
  .sepStrong{height:1px; background:var(--border); margin:10px 0 18px;}
  .line1wrap{position:relative;}
  #line1Lock{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:6px; background:rgba(255,253,248,0.92); border-radius:10px; backdrop-filter:blur(1px);
  }
  #line1Lock .lockIcon{width:20px; height:20px; border:2px solid var(--text-muted); border-radius:4px; position:relative;}
  #line1Lock .lockIcon::before{content:"";position:absolute; top:-10px; left:3px; width:10px; height:10px; border:2px solid var(--text-muted); border-bottom:none; border-radius:6px 6px 0 0;}
  #line1Lock span{font-size:12px; color:var(--text-muted);}

  .trayLabel{font-size:12px; color:var(--text-secondary); margin-bottom:8px;}
  #tray{display:flex; gap:14px; min-height:44px; flex-wrap:wrap;}

  .washScene{display:flex; align-items:center; gap:16px; position:relative;}
  .washBtn{display:flex; align-items:flex-end; cursor:pointer; user-select:none; padding:8px 10px; border-radius:16px; transition:transform .1s, background .15s; flex-shrink:0; background:rgba(255,255,255,0.4); border:1.5px dashed rgba(138,93,59,0.35); touch-action:manipulation;}
  .washBtn:hover{background:rgba(255,255,255,0.6);}
  .washBtn:active{transform:scale(0.95); background:rgba(255,255,255,0.7);}
  .washBtn.bounce{animation:washBounce .3s ease;}
  .washBtn img{width:96px; height:auto; display:block; image-rendering:pixelated; filter:drop-shadow(0 6px 6px rgba(0,0,0,0.18)); pointer-events:none;}
  @keyframes washBounce{0%{transform:scale(1) rotate(0)}40%{transform:scale(1.1) rotate(-4deg)}100%{transform:scale(1) rotate(0)}}
  .dirtyPile{display:flex; gap:7px; flex-wrap:wrap; align-items:center; min-height:26px; flex:1; align-self:center;}
  .dirtySock{width:18px; height:25px; background:#9c9686; clip-path:polygon(22% 0%,78% 0%,78% 55%,100% 55%,100% 82%,55% 100%,0% 82%,0% 55%,22% 55%); opacity:0.85;}
  .dirtySock.target{outline:2px solid #378ADD; outline-offset:2px; border-radius:3px; animation:targetPulse 1.1s ease-in-out infinite;}
  @keyframes targetPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.25)}}
  .washProgressOuter{height:8px; background:rgba(255,255,255,0.65); border-radius:6px; overflow:hidden; margin-top:12px;}
  .washProgressInner{height:100%; width:0%; background:linear-gradient(90deg,#378ADD,#1D9E75); transition:width .15s ease;}
  .washCaption{font-size:12px; color:var(--text-secondary); text-align:center; margin-top:8px;}
  .bubble{position:absolute; font-size:14px; pointer-events:none; animation:bubbleUp .6s ease forwards;}
  @keyframes bubbleUp{0%{opacity:1; transform:translateY(0)}100%{opacity:0; transform:translateY(-30px)}}

  .sock{width:26px; height:36px; clip-path:polygon(22% 0%,78% 0%,78% 55%,100% 55%,100% 82%,55% 100%,0% 82%,0% 55%,22% 55%); position:relative; pointer-events:none; filter:drop-shadow(0 2px 3px rgba(0,0,0,0.15));}
  .sock::after{content:"";position:absolute; top:4px; left:0; right:0; height:2px; background:rgba(255,255,255,0.35);}
  .sockWrap{width:42px; height:50px; display:flex; align-items:center; justify-content:center; cursor:grab; touch-action:none; transition:transform .12s; border-radius:8px;}
  .sockWrap:active{cursor:grabbing; transform:scale(1.1);}
  .sockWrap:hover{background:rgba(0,0,0,0.04);}
  .clip{position:absolute; top:0; left:50%; transform:translateX(-50%); width:9px; height:7px; background:var(--wood-dark); border-radius:2px; z-index:2;}

  .scorePop{
    position:absolute; left:50%; top:-6px; transform:translateX(-50%);
    font-size:13px; font-weight:700; color:#c17a1f; pointer-events:none;
    animation:scoreFloat .7s ease forwards;
  }
  @keyframes scoreFloat{0%{opacity:0; transform:translate(-50%,4px)}20%{opacity:1}100%{opacity:0; transform:translate(-50%,-22px)}}

  @keyframes pop{0%{transform:scale(1) translateX(-50%);opacity:1}60%{transform:scale(1.35) translateX(-50%);opacity:1}100%{transform:scale(0.15) translateX(-50%);opacity:0}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  @keyframes fadeIn{from{opacity:0; transform:translateY(-4px)}to{opacity:1; transform:translateY(0)}}
  .pop{animation:pop .35s ease forwards;}
  .miss{animation:shake .3s ease;}
  .unlocked{animation:fadeIn .5s ease;}

  #banner{
    position:absolute; top:10px; left:50%; transform:translateX(-50%) translateY(-140%);
    background:#2c2c2a; color:#fffdf8; font-size:13px; font-weight:600;
    padding:8px 16px; border-radius:20px; white-space:nowrap; transition:transform .35s ease; z-index:10;
  }
  #banner.show{transform:translateX(-50%) translateY(0);}

  #over{display:none; text-align:center; padding:24px 0 4px;}
  #over p.title{font-size:17px; font-weight:700; margin:0 0 4px;}
  #over p.sub{font-size:13px; color:var(--text-secondary); margin:0 0 14px;}
  button{
    font-family:inherit; font-size:14px; font-weight:600; padding:9px 20px; border-radius:10px;
    border:1px solid var(--border-strong); background:var(--card); color:var(--text); cursor:pointer;
    transition:background .15s, transform .1s; touch-action:manipulation; -webkit-tap-highlight-color:transparent;
  }
  button:hover{background:#f2eee2;}
  button:active{transform:scale(0.97);}
  #restartBtn{display:block; margin:0 auto;}
  #soundBtn{font-size:16px; padding:8px 10px; border-radius:10px; min-width:40px; min-height:40px;}
  #calmBtn{font-size:12px; padding:8px 12px; display:flex; align-items:center; gap:5px; min-height:40px;}
  #calmBtn:disabled{opacity:0.4; cursor:not-allowed;}
  #calmBtn.ready{box-shadow:0 0 0 2px rgba(55,138,221,0.4);}
  .rainbowRing{position:absolute; inset:-3px; border-radius:8px; border:2px dashed #b8860b; animation:spin 3s linear infinite; pointer-events:none;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .calming{box-shadow:inset 0 0 0 3px rgba(55,138,221,0.35) !important;}
  .rainbowSock{background:linear-gradient(135deg,#D85A30,#BA7517,#1D9E75,#378ADD,#7F77DD,#D4537E)!important; background-size:300% 300%; animation:rainbowShift 2.4s linear infinite, popIdle 1.6s ease-in-out infinite;}
  @keyframes rainbowShift{0%{background-position:0% 50%}100%{background-position:100% 50%}}
  @keyframes popIdle{0%,100%{filter:drop-shadow(0 2px 3px rgba(0,0,0,0.15)) drop-shadow(0 0 4px rgba(255,255,255,0.6))}50%{filter:drop-shadow(0 2px 3px rgba(0,0,0,0.15)) drop-shadow(0 0 9px rgba(255,255,255,0.9))}}
  .hintOverlay{
    position:fixed; inset:0; background:rgba(30,26,20,0.45); z-index:60;
    display:flex; align-items:center; justify-content:center; padding:24px;
    opacity:0; pointer-events:none; transition:opacity .18s ease;
  }
  .hintOverlay.show{opacity:1; pointer-events:auto;}
  .hintBox{
    background:#f6f4ee; border-radius:16px; padding:20px 20px 18px; max-width:360px; width:100%;
    max-height:76vh; overflow-y:auto; position:relative; box-shadow:0 20px 50px rgba(0,0,0,0.3);
    transform:scale(0.94); transition:transform .18s ease;
  }
  .hintOverlay.show .hintBox{transform:scale(1);}
  .hintBox h3{margin:0 0 10px; font-size:15px; font-weight:700;}
  /* 排行榜样式 */
  .lbEntry{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;margin-bottom:2px;font-size:11px;}
  .lbEntry:nth-child(1){background:#fff3cd;}.lbEntry:nth-child(2){background:#f0f0f0;}.lbEntry:nth-child(3){background:#fce4d6;}
  .lbEntry .rank{width:22px;text-align:center;font-weight:700;color:var(--text-muted);font-size:11px;}
  .lbEntry .rank.top{font-size:13px;}
  .lbEntry .lbScore{font-weight:700;flex:1;text-align:right;}
  .lbEntry .lbLevel{color:var(--text-secondary);font-size:10px;width:36px;text-align:right;}
  .lbEntry .lbDate{color:var(--text-muted);font-size:9px;min-width:50px;text-align:right;}
  .lbEntry.me{border:1.5px solid #378ADD;background:#e8f0fc!important;}
  .lbEmpty{padding:15px 0;font-size:11px;color:var(--text-muted);}
  .lbSummary{font-size:10px;color:var(--text-secondary);text-align:center;padding:4px 0 0;border-top:1px solid var(--border);margin-top:4px;}
  /* 游戏结束弹窗 */
  .overPanel{position:fixed;inset:0;background:rgba(30,26,20,0.5);z-index:70;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .2s ease;}
  .overPanel.show{opacity:1;pointer-events:auto;}
  .overBox{background:#f6f4ee;border-radius:18px;padding:24px 20px 18px;max-width:320px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,0.3);transform:scale(0.92);transition:transform .2s ease;text-align:center;}
  .overPanel.show .overBox{transform:scale(1);}
  .overBox .otitle{font-size:18px;font-weight:700;margin:0 0 4px;}
  .overBox .osub{font-size:13px;color:var(--text-secondary);margin:0 0 14px;}
  .hintBox p{text-align:left; font-size:12.5px; color:var(--text-secondary); line-height:1.7; margin:0;}
  .hintClose{
    position:absolute; top:10px; right:10px; width:32px; height:32px; border-radius:8px;
    border:1px solid var(--border-strong); background:var(--card); cursor:pointer; font-size:15px;
    display:flex; align-items:center; justify-content:center; padding:0; touch-action:manipulation;
  }
  #hintBtn{font-size:14px; padding:8px 10px; border-radius:10px; min-width:40px; min-height:40px;}
  #hintBtn.active{background:#f2eee2; box-shadow:0 0 0 2px rgba(55,138,221,0.35);}
</style>
</head>

  <!-- 游戏结束弹窗已移到下方 -->
  <div class="hintOverlay" id="hintPanel">
    <div class="hintBox">
      <button class="hintClose" id="hintClose" title="关闭">✕</button>
      <h3>玩法说明</h3>
      <p>绳子会持续随风摇摆，等级越高摆得越猛，瞄准时记得预判它的晃动。<br><br>脏袜子要先在下方盆里洗干净才会出现在队列里，洗一只需要点击好几下，等级越高需要的次数越多。<br><br>队列堆满、洗好的袜子挤爆、放错位置或脱靶都会扣一颗心，三颗心用完游戏结束。<br><br>出现<b>彩虹袜</b>时可以和任意颜色配对，还能拿额外加分；每配对 4 次攒 1 点"稳一稳"能量，可以短暂止风 3 秒。</p>
    </div>
  </div>
  <!-- 游戏结束弹窗（含排行榜） -->
  <div class="overPanel" id="overPanel">
    <div class="overBox" style="max-width:360px;">
      <p class="otitle">游戏结束</p>
      <p class="osub" id="finalScore" style="margin-bottom:8px;"></p>
      <div style="border-top:1px solid var(--border);padding-top:8px;margin-bottom:8px;">
        <p style="font-size:12px;font-weight:700;margin:0 0 6px;">🏆 排行榜（Top20）</p>
        <div id="lbListOver" style="text-align:left;"></div>
      </div>
      <button id="restartBtn" style="font-family:inherit;font-size:14px;font-weight:600;padding:9px 20px;border-radius:10px;border:1px solid var(--border-strong);background:var(--card);color:var(--text);cursor:pointer;">再来一局</button>
    </div>
  </div>

<script>
(function(){
  const colors=[
    {n:'coral',h:'#D85A30'},{n:'teal',h:'#1D9E75'},{n:'blue',h:'#378ADD'},
    {n:'pink',h:'#D4537E'},{n:'purple',h:'#7F77DD'},{n:'amber',h:'#BA7517'}
  ];
  const SLOTS=7, TRAYMAX=4, LINE2_LEVEL=3, DIRTY_MAX=4;
  let lines=[new Array(SLOTS).fill(null), new Array(SLOTS).fill(null)];
  let queue=[]; let score=0, level=1, lives=3, matches=0, colorsUnlocked=4;
  let combo=0, comboTimer=null;
  let spawnTimer=null, running=true, line2Unlocked=false, soundOn=true;
  let calmCharges=0, calmUntil=0, comboBank=0;
  let dirtyQueue=[], washProgress=0;
  function washNeeded(){ return Math.min(2+Math.floor((level-1)/2),5); }
  const RAINBOW='conic-gradient(#D85A30,#1D9E75,#378ADD,#D4537E,#7F77DD,#BA7517,#D85A30)';

  const wrap=document.getElementById('game');
  const track=[document.getElementById('line0Track'),document.getElementById('line1Track')];
  const line1Lock=document.getElementById('line1Lock');
  const tray=document.getElementById('tray');
  const scoreEl=document.getElementById('score');
  const levelEl=document.getElementById('level');
  const heartsEl=document.getElementById('hearts');
  const windLabel=document.getElementById('windLabel');
  const comboLabel=document.getElementById('comboLabel');
  const overEl=document.getElementById('over');
  const banner=document.getElementById('banner');
  const soundBtn=document.getElementById('soundBtn');
  const calmBtn=document.getElementById('calmBtn');
  const calmCount=document.getElementById('calmCount');
  const washBtn=document.getElementById('washBtn');
  const dirtyPileEl=document.getElementById('dirtyPile');
  const washProgressBar=document.getElementById('washProgressBar');
  const washCaption=document.getElementById('washCaption');

  function updateCalmUI(){
    calmCount.textContent=calmCharges;
    calmBtn.disabled=calmCharges<=0;
    calmBtn.classList.toggle('ready',calmCharges>0);
  }
  calmBtn.addEventListener('click',()=>{
    if(calmCharges<=0 || !running) return;
    calmCharges--;
    updateCalmUI();
    calmUntil=performance.now()+3000;
    showBanner('风平息了片刻');
    beep(520,0.2,'sine');
    wrap.classList.add('calming');
    setTimeout(()=>wrap.classList.remove('calming'),3000);
  });

  let audioCtx=null;
  function beep(freq,dur,type){
    if(!soundOn) return;
    try{
      if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type=type||'sine'; o.frequency.value=freq;
      g.gain.value=0.06;
      o.connect(g); g.connect(audioCtx.destination);
      o.start();
      g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
      o.stop(audioCtx.currentTime+dur);
    }catch(e){}
  }
  soundBtn.addEventListener('click',()=>{
    soundOn=!soundOn;
    soundBtn.textContent=soundOn?'🔊':'🔇';
  });

  const hintBtn=document.getElementById('hintBtn');
  const hintPanel=document.getElementById('hintPanel');
  const hintClose=document.getElementById('hintClose');
  function openHint(){
    hintPanel.classList.add('show');
    hintBtn.classList.add('active');
  }
  function closeHint(){
    hintPanel.classList.remove('show');
    hintBtn.classList.remove('active');
  }
  hintBtn.addEventListener('click',openHint);
  hintClose.addEventListener('click',closeHint);
  hintPanel.addEventListener('click',(e)=>{
    if(e.target===hintPanel) closeHint();
  });

  // ===== 排行榜 =====
  const LB_KEY='cl_lb';
  const lbList=document.getElementById('lbListOver');

  function loadLB(){try{return JSON.parse(localStorage.getItem(LB_KEY))||[]}catch(e){return[]}}
  function saveLB(d){try{localStorage.setItem(LB_KEY,JSON.stringify(d))}catch(e){}}

  function submitScore(sc,lv){
    const lb=loadLB();
    lb.push({score:sc,level:lv,date:new Date().toLocaleDateString('zh-CN')});
    lb.sort((a,b)=>b.score-a.score);
    if(lb.length>20)lb.length=20;
    saveLB(lb);
    // 推送到抖音好友排行榜
    if(typeof tt!=='undefined'&&tt.postMessage) tt.postMessage({type:'score_update',score:sc,level:lv,total:lb.length,rank:Math.min(lb.findIndex((e,i)=>e.score===sc&&e.level===lv&&i<20)+1,lb.length)});
    return lb.findIndex((e,i)=>e.score===sc&&e.level===lv&&i<20);
  }

  function renderLB(highlight){
    const lb=loadLB();
    if(!lb.length){lbList.innerHTML='<div class="lbEmpty">暂无记录，快去玩一局吧！</div>';return;}
    let html='';
    lb.forEach((e,i)=>{
      const isMe=highlight!==void 0&&i===highlight;
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
      html+='<div class="lbEntry'+(isMe?' me':'')+'">'
        +'<span class="rank'+(i<3?' top':'')+'">'+medal+'</span>'
        +'<span class="lbScore">'+e.score+'</span>'
        +'<span class="lbLevel">Lv.'+e.level+'</span>'
        +'<span class="lbDate">'+e.date+'</span>'
        +'</div>';
    });
    // 好友排名摘要
    if(highlight!==void 0&&highlight>0){
      const pct=Math.round((1-(highlight/lb.length))*100);
      html+='<div class="lbSummary">🎉 你超过了 '+pct+'% 的玩家！</div>';
    }else if(highlight===0){
      html+='<div class="lbSummary">👑 你是第一名！太厉害了！</div>';
    }
    lbList.innerHTML=html;
  }

  function showBanner(text){
    banner.textContent=text;
    banner.classList.add('show');
    clearTimeout(showBanner._t);
    showBanner._t=setTimeout(()=>banner.classList.remove('show'),1400);
  }

  function randColor(){
    if(Math.random()<0.1) return {n:'rainbow',h:RAINBOW,rainbow:true};
    return colors[Math.floor(Math.random()*colorsUnlocked)];
  }

  function renderHearts(justLost){
    heartsEl.innerHTML='';
    for(let i=0;i<3;i++){
      const s=document.createElement('span');
      s.className='heart'+(i<lives?' on':'')+((justLost && i===lives)?' lost':'');
      s.textContent='♥';
      heartsEl.appendChild(s);
    }
  }

  function renderLine(li){
    const t=track[li];
    t.innerHTML='';
    lines[li].forEach((s,i)=>{
      const slot=document.createElement('div');
      slot.className='slot'; slot.dataset.idx=i; slot.dataset.line=li;
      if(s){
        const clip=document.createElement('div');
        clip.className='clip';
        slot.appendChild(clip);
        const sock=document.createElement('div');
        sock.className='sock'+(s.anim?(' '+s.anim):'');
        sock.style.cssText='position:absolute;top:6px;left:50%;transform:translateX(-50%);background:'+s.h+';filter:drop-shadow(0 2px 2px rgba(0,0,0,0.12));';
        if(s.rainbow){
          const ring=document.createElement('div');
          ring.className='rainbowRing';
          ring.style.cssText+='position:absolute;top:2px;left:50%;transform:translateX(-50%);width:30px;height:30px;';
          slot.appendChild(ring);
        }
        slot.appendChild(sock);
      }
      t.appendChild(slot);
    });
  }
  function renderAllLines(){ renderLine(0); if(line2Unlocked) renderLine(1); }

  function renderTray(){
    tray.innerHTML='';
    queue.forEach((q,i)=>{
      const handle=document.createElement('div');
      handle.className='sockWrap';
      handle.dataset.qidx=i;
      const sock=document.createElement('div');
      sock.className='sock';
      sock.style.background=q.h;
      handle.appendChild(sock);
      handle.addEventListener('pointerdown',onDragStart);
      tray.appendChild(handle);
    });
  }

  function updateWind(){ windLabel.textContent='风力 '+level; }

  function renderDirtyPile(){
    dirtyPileEl.innerHTML='';
    dirtyQueue.forEach((d,i)=>{
      const s=document.createElement('div');
      s.className='dirtySock'+(i===0?' target':'');
      dirtyPileEl.appendChild(s);
    });
    const need=washNeeded();
    washProgressBar.style.width=(dirtyQueue.length? (washProgress/need)*100 : 0)+'%';
  }

  function spawnBubble(){
    const b=document.createElement('span');
    b.className='bubble';
    b.textContent='💧';
    b.style.left=(30+Math.random()*18)+'px';
    b.style.top='2px';
    washBtn.parentElement.appendChild(b);
    setTimeout(()=>b.remove(),650);
  }

  function washClick(){
    if(!running) return;
    washBtn.classList.remove('bounce'); void washBtn.offsetWidth; washBtn.classList.add('bounce');
    if(dirtyQueue.length===0){
      washCaption.textContent='暂时没有脏袜子，等一会儿吧～';
      return;
    }
    spawnBubble();
    beep(380+Math.random()*100,0.08,'sine');
    washProgress++;
    const need=washNeeded();
    washProgressBar.style.width=Math.min(100,(washProgress/need)*100)+'%';
    if(washProgress>=need){
      const clean=dirtyQueue.shift();
      washProgress=0;
      renderDirtyPile();
      if(queue.length>=TRAYMAX){
        queue.shift();
        loseLife();
        showBanner('晾衣队列挤爆了一只袜子');
      }
      queue.push(clean);
      renderTray();
      beep(700,0.16,'triangle');
      washCaption.textContent='洗好啦！拖去晾一晾吧';
    }else{
      washCaption.textContent='搓一搓… '+washProgress+' / '+need;
    }
  }
  washBtn.addEventListener('click',washClick);

  function popScore(slotEl,amount){
    const p=document.createElement('div');
    p.className='scorePop';
    p.textContent='+'+amount;
    slotEl.appendChild(p);
    setTimeout(()=>p.remove(),720);
  }

  function bumpCombo(){
    combo++;
    if(combo>=2){
      comboLabel.textContent=combo+' 连击';
      comboLabel.classList.add('show');
      clearTimeout(comboTimer);
      comboTimer=setTimeout(()=>comboLabel.classList.remove('show'),1200);
    }
  }
  function resetCombo(){
    combo=0;
    comboLabel.classList.remove('show');
  }

  function checkMatch(li,idx){
    const arr=lines[li];
    const s=arr[idx];
    if(!s) return;
    [idx-1,idx+1].forEach(n=>{
      if(n>=0 && n<SLOTS && arr[n] && !arr[n].matched && !s.matched && (s.rainbow || arr[n].rainbow || arr[n].h===s.h)){
        s.matched=true; arr[n].matched=true;
        s.anim='pop'; arr[n].anim='pop';
        renderLine(li);
        beep(660,0.12,'triangle');
        const slotEl=track[li].querySelector('[data-idx="'+idx+'"]');
        bumpCombo();
        const wildcardBonus=(s.rainbow||arr[n].rainbow)?20:0;
        const gained=10*level+Math.max(0,(combo-1)*5)+wildcardBonus;
        if(slotEl) popScore(slotEl,gained);
        setTimeout(()=>{
          arr[idx]=null; arr[n]=null;
          score+=gained; matches++;
          scoreEl.textContent=score;
          comboBank++;
          if(comboBank>=4){
            comboBank=0;
            calmCharges=Math.min(calmCharges+1,3);
            updateCalmUI();
          }
          if(matches%5===0){
            level=Math.min(level+1,6);
            colorsUnlocked=Math.min(4+level-1,6);
            levelEl.textContent=level;
            updateWind();
            resetSpawn();
            showBanner('升级到 '+level+' 级！');
            beep(880,0.18,'sine');
            maybeUnlockLine2();
          }
          renderLine(li);
        },320);
      }
    });
  }

  function maybeUnlockLine2(){
    if(!line2Unlocked && level>=LINE2_LEVEL){
      line2Unlocked=true;
      line1Lock.style.display='none';
      track[1].classList.add('unlocked');
      showBanner('第二根绳子解锁！');
    }
  }

  function loseLife(){
    lives--; renderHearts(true);
    resetCombo();
    beep(180,0.25,'sawtooth');
    if(lives<=0){ endGame(); }
  }

  function endGame(){
    running=false;
    clearInterval(spawnTimer);
    document.getElementById('finalScore').textContent='最终得分 '+score+' · 到达等级 '+level;
    const rank=submitScore(score,level);
    document.getElementById('overPanel').classList.add('show');
    renderLB(rank);
  }

  let ghost=null, dragQidx=null, hoverSlotEl=null;
  function onDragStart(e){
    if(!running) return;
    e.preventDefault();
    dragQidx=parseInt(e.currentTarget.dataset.qidx);
    ghost=document.createElement('div');
    ghost.className='sock';
    ghost.style.cssText='background:'+queue[dragQidx].h+';position:absolute;pointer-events:none;z-index:20;filter:drop-shadow(0 4px 6px rgba(0,0,0,0.2));';
    wrap.appendChild(ghost);
    moveGhost(e);
    window.addEventListener('pointermove',moveGhost);
    window.addEventListener('pointerup',onDragEnd);
  }
  function clearHover(){
    if(hoverSlotEl){
      hoverSlotEl.classList.remove('hoverValid','hoverInvalid');
      hoverSlotEl=null;
    }
  }
  function moveGhost(e){
    const rect=wrap.getBoundingClientRect();
    ghost.style.left=(e.clientX-rect.left-13)+'px';
    ghost.style.top=(e.clientY-rect.top-17)+'px';

    const el=document.elementFromPoint(e.clientX,e.clientY);
    const slotEl=el && el.closest ? el.closest('.slot') : null;
    if(slotEl!==hoverSlotEl){
      clearHover();
      if(slotEl){
        const li=parseInt(slotEl.dataset.line);
        const idx=parseInt(slotEl.dataset.idx);
        const valid=(li===0 || line2Unlocked) && lines[li][idx]===null;
        slotEl.classList.add(valid?'hoverValid':'hoverInvalid');
        hoverSlotEl=slotEl;
      }
    }
  }
  function onDragEnd(e){
    window.removeEventListener('pointermove',moveGhost);
    window.removeEventListener('pointerup',onDragEnd);
    if(ghost){ ghost.remove(); ghost=null; }
    clearHover();
    const el=document.elementFromPoint(e.clientX,e.clientY);
    const slotEl=el && el.closest ? el.closest('.slot') : null;
    const q=queue[dragQidx];
    let placed=false;
    if(slotEl){
      const li=parseInt(slotEl.dataset.line);
      const idx=parseInt(slotEl.dataset.idx);
      if((li===0 || line2Unlocked) && lines[li][idx]===null){
        lines[li][idx]={h:q.h, rainbow:!!q.rainbow};
        placed=true;
        queue.splice(dragQidx,1);
        renderLine(li); renderTray();
        checkMatch(li,idx);
      }
    }
    if(!placed){
      queue.splice(dragQidx,1);
      renderTray();
      loseLife();
      wrap.classList.add('miss');
      setTimeout(()=>wrap.classList.remove('miss'),300);
    }
    dragQidx=null;
  }

  function dirtySpawnTick(){
    if(!running) return;
    if(dirtyQueue.length>=DIRTY_MAX){
      dirtyQueue.shift();
      if(dirtyQueue.length===0) washProgress=0;
      loseLife();
      showBanner('一只脏袜子发霉溜走了');
    }
    dirtyQueue.push(randColor());
    renderDirtyPile();
  }
  function resetSpawn(){
    clearInterval(spawnTimer);
    const interval=Math.max(600,2400-level*300);
    spawnTimer=setInterval(dirtySpawnTick,interval);
  }

  function loop(t){
    if(running){
      const calm=t<calmUntil;
      const amp=(10+level*7)*(calm?0.15:1);
      const freq=(0.0009+level*0.00035)*(calm?0.5:1);
      const sway0=amp*Math.sin(t*freq);
      track[0].style.transform='translateX('+sway0.toFixed(1)+'px) rotate('+(sway0*0.018).toFixed(2)+'deg)';
      if(line2Unlocked){
        const sway1=(amp*1.15)*Math.sin(t*freq*1.3+Math.PI/3);
        track[1].style.transform='translateX('+sway1.toFixed(1)+'px) rotate('+(sway1*0.018).toFixed(2)+'deg)';
      }
    }
    requestAnimationFrame(loop);
  }

  document.getElementById('restartBtn').addEventListener('click',()=>{
    lines=[new Array(SLOTS).fill(null), new Array(SLOTS).fill(null)];
    queue=[]; score=0; level=1; lives=3; matches=0; colorsUnlocked=4;
    running=true; line2Unlocked=false;
    calmCharges=0; calmUntil=0; comboBank=0;
    dirtyQueue=[]; washProgress=0;
    resetCombo();
    updateCalmUI();
    line1Lock.style.display='flex';
    document.getElementById('overPanel').classList.remove('show');
    scoreEl.textContent='0'; levelEl.textContent='1';
    washCaption.textContent='点击盆子，帮小孩把脏袜子洗干净';
    renderHearts(); renderAllLines(); renderTray(); renderDirtyPile(); updateWind();
    for(let i=0;i<2;i++) dirtySpawnTick();
    resetSpawn();
  });

  updateCalmUI();
  renderHearts(); renderAllLines(); updateWind(); renderTray(); renderDirtyPile();
  for(let i=0;i<2;i++) dirtySpawnTick();
  resetSpawn();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
